apiVersion: apps/v1
kind: Deployment
metadata:
  name: ee-backend
  namespace: ee
  labels:
    app: ee-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ee-backend
  template:
    metadata:
      labels:
        app: ee-backend
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: backend
          image: ghcr.io/placeholder/ee-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: wow-auction-engine-config
            - secretRef:
                name: wow-auction-engine-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 1024Mi
            limits:
              cpu: "2"
              memory: 3072Mi
