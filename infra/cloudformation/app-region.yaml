AWSTemplateFormatVersion: "2010-09-09"
Description: Reusable single-region stack for the WoW Auction Engine service.

Parameters:
  AppName:
    Type: String
    Default: wow-auction-engine
  Environment:
    Type: String
    Default: prod
  RegionCode:
    Type: String
  ProjectTag:
    Type: String
    Default: WAH
  InstanceType:
    Type: String
    Default: t4g.micro
  InstanceEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  ContainerPort:
    Type: Number
    Default: 8080
  FrontendContainerPort:
    Type: Number
    Default: 4000
  FrontendHostPort:
    Type: Number
    Default: 80
  HealthCheckPath:
    Type: String
    Default: /api/health
  AllowedIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  JvmMaxRamPercentage:
    Type: String
    Default: "65.0"
  ParameterPathPrefix:
    Type: String
  VpcId:
    Type: String
  SubnetId:
    Type: String
  KeyPairName:
    Type: String
    Default: ""

Conditions:
  CreateInstance: !Equals [!Ref InstanceEnabled, "true"]
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/ec2/${AppName}/${Environment}/${RegionCode}"
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  AppRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref AppName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${AppName}-frontend"
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Sub "${AppName}-frontend"
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      GroupDescription: !Sub "${AppName} ${Environment} ingress"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref FrontendHostPort
          ToPort: !Ref FrontendHostPort
          CidrIp: !Ref AllowedIngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-${Environment}-${RegionCode}-sg"
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: !Sub "${AppName}-${Environment}-runtime"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterPathPrefix}/*"
              - Effect: Allow
                Action: [kms:Decrypt]
                Resource: "*"
              - Effect: Allow
                Action: [ecr:GetAuthorizationToken]
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:DescribeImages
                  - ecr:GetDownloadUrlForLayer
                Resource:
                  - !GetAtt AppRepository.Arn
                  - !GetAtt FrontendRepository.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${AppLogGroup.Arn}:*"
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/wah_auction_houses"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/wah_auction_houses/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/wah_auction_houses_update_log"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource: "arn:aws:s3:::wah-data*/*"
              - Effect: Allow
                Action: [s3:ListBucket]
                Resource: "arn:aws:s3:::wah-data*"
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref AppInstanceRole]

  AppInstance:
    Type: AWS::EC2::Instance
    Condition: CreateInstance
    Properties:
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}"
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref AppInstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref AppSecurityGroup]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          dnf update -y
          dnf install -y docker awscli amazon-cloudwatch-agent
          systemctl enable --now docker
          usermod -a -G docker ec2-user

          install -d -m 755 /opt/${AppName}/bin /opt/${AppName}/config

          cat > /opt/${AppName}/bin/write-env-file.sh <<'EOF'
          #!/bin/bash
          set -euo pipefail

          PARAMETER_PREFIX="${ParameterPathPrefix}"
          OUTPUT_FILE="/opt/${AppName}/config/app.env"
          TMP_FILE="$(mktemp)"

          fetch_param() {
            local name="$1"
            local with_decryption="$2"
            if [[ "$with_decryption" == "true" ]]; then
              aws ssm get-parameter --region "${AWS::Region}" --name "$PARAMETER_PREFIX/$name" --with-decryption --query 'Parameter.Value' --output text 2>/dev/null || true
            else
              aws ssm get-parameter --region "${AWS::Region}" --name "$PARAMETER_PREFIX/$name" --query 'Parameter.Value' --output text 2>/dev/null || true
            fi
          }

          write_line() {
            local key="$1"
            local value="$2"
            if [[ -n "$value" && "$value" != "None" ]]; then
              printf '%s=%s\n' "$key" "$value" >> "$TMP_FILE"
            fi
          }

          : > "$TMP_FILE"
          write_line "SPRING_PROFILES_ACTIVE" "$(fetch_param SPRING_PROFILES_ACTIVE false)"
          write_line "WAE_AWS_REGION" "$(fetch_param WAE_AWS_REGION false)"
          write_line "WAE_BLIZZARD_REGIONS" "$(fetch_param WAE_BLIZZARD_REGIONS false)"
          write_line "WAE_BLIZZARD_REGION" "$(fetch_param WAE_BLIZZARD_REGION false)"
          write_line "AUCTION_ENGINE_DB_URL" "$(fetch_param AUCTION_ENGINE_DB_URL false)"
          write_line "AUCTION_ENGINE_DB_USERNAME" "$(fetch_param AUCTION_ENGINE_DB_USERNAME true)"
          write_line "AUCTION_ENGINE_DB_PASSWORD" "$(fetch_param AUCTION_ENGINE_DB_PASSWORD true)"
          write_line "BLIZZARD_CLIENT_ID" "$(fetch_param BLIZZARD_CLIENT_ID true)"
          write_line "BLIZZARD_CLIENT_SECRET" "$(fetch_param BLIZZARD_CLIENT_SECRET true)"
          write_line "AWS_ACCESS_KEY" "$(fetch_param AWS_ACCESS_KEY true)"
          write_line "AWS_SECRET_KEY" "$(fetch_param AWS_SECRET_KEY true)"
          write_line "WAE_DYNAMODB_ENDPOINT" "$(fetch_param WAE_DYNAMODB_ENDPOINT false)"
          write_line "WAE_S3_ENDPOINT" "$(fetch_param WAE_S3_ENDPOINT false)"
          write_line "JAVA_TOOL_OPTIONS" "$(fetch_param JAVA_TOOL_OPTIONS false)"
          write_line "JVM_MAX_RAM_PERCENTAGE" "$(fetch_param JVM_MAX_RAM_PERCENTAGE false)"
          mv "$TMP_FILE" "$OUTPUT_FILE"
          chmod 600 "$OUTPUT_FILE"
          EOF

          chmod +x /opt/${AppName}/bin/write-env-file.sh
          cat > /opt/${AppName}/bin/restart-container.sh <<'EOF'
          #!/bin/bash
          set -euo pipefail

          require_env() {
            local var_name="$1"
            if [[ -z "$(printenv "$var_name" || true)" ]]; then
              echo "Missing required environment variable: $var_name" >&2
              exit 1
            fi
          }

          require_env APP_NAME
          require_env AWS_REGION
          require_env IMAGE_URI
          require_env CONTAINER_PORT

          resolved_log_group="$(printenv LOG_GROUP || true)"
          if [[ -n "$resolved_log_group" ]]; then
            LOG_GROUP="$resolved_log_group"
          else
            LOG_GROUP="/aws/ec2/$APP_NAME"
          fi

          resolved_host_port="$(printenv HOST_PORT || true)"
          if [[ -n "$resolved_host_port" ]]; then
            HOST_PORT="$resolved_host_port"
          else
            HOST_PORT=""
          fi

          REGISTRY="$(printf '%s\n' "$IMAGE_URI" | cut -d/ -f1)"
          NETWORK_NAME="$(printenv NETWORK_NAME || true)"

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY"

          docker pull "$IMAGE_URI"
          docker rm -f "$APP_NAME" >/dev/null 2>&1 || true

          if [[ -z "$(printenv NG_ALLOWED_HOSTS || true)" ]]; then
            imds="http://169.254.169.254"
            if token="$(curl -fsS --max-time 1 -X PUT "$imds/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60" 2>/dev/null)"; then
              pub="$(curl -fsS --max-time 1 -H "X-aws-ec2-metadata-token: $token" "$imds/latest/meta-data/public-ipv4" 2>/dev/null)" || true
              if [[ -n "$pub" ]]; then
                export NG_ALLOWED_HOSTS="$pub"
              fi
            fi
          fi

          set -- -d --name "$APP_NAME" --restart unless-stopped \
            --log-driver awslogs \
            --log-opt awslogs-region="$AWS_REGION" \
            --log-opt awslogs-group="$LOG_GROUP" \
            --log-opt awslogs-stream="$APP_NAME"

          if [[ -n "$HOST_PORT" ]]; then
            set -- "$@" -p "$HOST_PORT:$CONTAINER_PORT"
          fi

          if [[ -n "$(printenv ENV_FILE_PATH || true)" ]]; then
            set -- "$@" --env-file "$ENV_FILE_PATH"
          fi

          if [[ -n "$NETWORK_NAME" ]]; then
            docker network create "$NETWORK_NAME" >/dev/null 2>&1 || true
            set -- "$@" --network "$NETWORK_NAME"
          fi

          if [[ -n "$(printenv BACKEND_ORIGIN || true)" ]]; then
            set -- "$@" -e "BACKEND_ORIGIN=$BACKEND_ORIGIN"
          fi

          if [[ -n "$(printenv NG_ALLOWED_HOSTS || true)" ]]; then
            set -- "$@" -e "NG_ALLOWED_HOSTS=$NG_ALLOWED_HOSTS"
          fi

          docker run "$@" "$IMAGE_URI"
          EOF

          chmod +x /opt/${AppName}/bin/restart-container.sh

          docker network create ${AppName}-network >/dev/null 2>&1 || true

          cat > /etc/systemd/system/${AppName}-backend.service <<'EOF'
          [Unit]
          Description=${AppName} backend container bootstrap
          Wants=network-online.target docker.service
          After=network-online.target docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/bash -lc '/opt/${AppName}/bin/write-env-file.sh && APP_NAME=${AppName}-backend AWS_REGION=${AWS::Region} IMAGE_URI=${AppRepository.RepositoryUri}:master ENV_FILE_PATH=/opt/${AppName}/config/app.env CONTAINER_PORT=${ContainerPort} NETWORK_NAME=${AppName}-network LOG_GROUP=/aws/ec2/${AppName}/${Environment}/${RegionCode} /opt/${AppName}/bin/restart-container.sh'
          Restart=on-failure
          RestartSec=30

          [Install]
          WantedBy=multi-user.target
          EOF

          cat > /etc/systemd/system/${AppName}-frontend.service <<'EOF'
          [Unit]
          Description=${AppName} frontend container bootstrap
          Wants=network-online.target docker.service
          After=network-online.target docker.service ${AppName}-backend.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/bash -lc 'APP_NAME=${AppName}-frontend AWS_REGION=${AWS::Region} IMAGE_URI=${FrontendRepository.RepositoryUri}:master CONTAINER_PORT=${FrontendContainerPort} HOST_PORT=${FrontendHostPort} NETWORK_NAME=${AppName}-network BACKEND_ORIGIN=http://${AppName}-backend:${ContainerPort} NG_ALLOWED_HOSTS=${AppElasticIp} LOG_GROUP=/aws/ec2/${AppName}/${Environment}/${RegionCode} /opt/${AppName}/bin/restart-container.sh'
          Restart=on-failure
          RestartSec=30

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable ${AppName}-backend.service
          systemctl enable ${AppName}-frontend.service
          /opt/${AppName}/bin/write-env-file.sh
          systemctl start ${AppName}-backend.service || true
          systemctl start ${AppName}-frontend.service || true
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-${Environment}-${RegionCode}"
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  AppElasticIp:
    Type: AWS::EC2::EIP
    Condition: CreateInstance
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-${Environment}-${RegionCode}-eip"
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode

  AppElasticIpAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: CreateInstance
    Properties:
      AllocationId: !GetAtt AppElasticIp.AllocationId
      InstanceId: !Ref AppInstance

Outputs:
  AppInstanceId:
    Condition: CreateInstance
    Value: !Ref AppInstance
  AppPublicIp:
    Condition: CreateInstance
    Value: !Ref AppElasticIp
  AppBaseUrl:
    Condition: CreateInstance
    Value: !Sub "http://${AppElasticIp}"
  AppRepositoryUri:
    Value: !GetAtt AppRepository.RepositoryUri
  FrontendRepositoryUri:
    Value: !GetAtt FrontendRepository.RepositoryUri
  ParameterPathPrefix:
    Value: !Ref ParameterPathPrefix
