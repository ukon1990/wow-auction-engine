name: App PR Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      force_full_verify:
        description: Run backend and frontend verify jobs even if change classification would skip them (recommended for manual runs before deploy).
        type: boolean
        default: false

jobs:
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      backend_verify_required: ${{ steps.classify.outputs.backend_verify_required }}
      frontend_verify_required: ${{ steps.classify.outputs.frontend_verify_required }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "base_sha=$(git rev-parse HEAD^ 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ steps.diff.outputs.base_sha }}"
          head_sha="${{ steps.diff.outputs.head_sha }}"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            git ls-tree -r --name-only "$head_sha" > /tmp/changed-files.txt
          elif git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            git diff --name-only "$base_sha" "$head_sha" > /tmp/changed-files.txt
          else
            echo "Base commit $base_sha is not available in this checkout; falling back to full repository classification." >&2
            git ls-tree -r --name-only "$head_sha" > /tmp/changed-files.txt
          fi
          classification="$(python3 scripts/deploy/classify_changes.py < /tmp/changed-files.txt)"
          echo "backend_verify_required=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['backend_verify_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "frontend_verify_required=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['frontend_verify_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"

  backend-build-and-test:
    name: Backend Style, Build, and Test
    needs: classify-changes
    if: >-
      ${{
        needs.classify-changes.outputs.backend_verify_required == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_full_verify == 'true')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Ensure Maven wrapper is executable
        run: chmod +x backend/mvnw

      - name: Enforce Flyway schema guardrails
        run: ./scripts/ci/check-flyway-guardrails.sh

      - name: Verify backend
        working-directory: backend
        run: ./mvnw -B -ntp -Dkotlin.compiler.daemon=false verify

      - name: Publish backend unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: success()
        with:
          files: backend/target/surefire-reports/**/*.xml
          check_name: Backend Test Results
          comment_mode: off

      - name: Backend coverage summary (log and job summary)
        shell: bash
        run: |
          set -euo pipefail
          report="backend/target/site/jacoco/jacoco.xml"
          if [[ ! -f "$report" ]]; then
            echo "Coverage report not found at $report"
            exit 1
          fi

          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          report_path = "backend/target/site/jacoco/jacoco.xml"
          tree = ET.parse(report_path)
          root = tree.getroot()

          def counter(typ: str):
              el = next((c for c in root.findall("counter") if c.get("type") == typ), None)
              if el is None:
                  return None
              covered = int(el.get("covered", "0"))
              missed = int(el.get("missed", "0"))
              total = covered + missed
              pct = (covered / total * 100) if total else 0.0
              return covered, missed, total, pct

          order = ["INSTRUCTION", "BRANCH", "LINE", "METHOD", "CLASS"]
          lines_out = []
          rows = []
          for typ in order:
              row = counter(typ)
              if row is None:
                  continue
              c, m, t, pct = row
              lines_out.append(f"Backend {typ.lower()} coverage: {c}/{t} ({pct:.2f}%)")
              rows.append((typ, c, m, t, pct))

          for ln in lines_out:
              print(ln)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as f:
                  f.write("## Backend coverage (JaCoCo)\n\n")
                  f.write("| Type | Covered | Missed | Total | % |\n")
                  f.write("| --- | ---: | ---: | ---: | ---: |\n")
                  for typ, c, m, t, pct in rows:
                      f.write(f"| {typ} | {c} | {m} | {t} | {pct:.2f} |\n")
                  f.write("\n")
          PY

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report
          path: |
            backend/target/site/jacoco/jacoco.xml
            backend/target/site/jacoco
          if-no-files-found: error

      - name: Upload deployable WAR artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/upload-artifact@v7
        with:
          name: backend-war
          path: backend/target/*.war
          if-no-files-found: error

  frontend-build-and-test:
    name: Frontend Style, Build, and Test
    needs: classify-changes
    if: >-
      ${{
        needs.classify-changes.outputs.frontend_verify_required == 'true' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.force_full_verify == 'true')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Check frontend lockfile matches Docker install context
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp package.json bun.lock "$tmp/"
          mkdir -p "$tmp/frontend"
          cp frontend/package.json "$tmp/frontend/"
          (cd "$tmp" && bun install --frozen-lockfile --production)

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Check frontend formatting
        working-directory: frontend
        run: bun run format:check

      - name: Lint frontend
        working-directory: frontend
        run: bun run lint

      - name: Test frontend (with coverage)
        working-directory: frontend
        run: bun run test:ci -- --coverage

      - name: Self-test frontend coverage summary script
        run: python3 "${GITHUB_WORKSPACE}/scripts/ci/frontend_coverage_summary.py" --test

      - name: Frontend coverage job summary
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          f="coverage/EE/coverage-summary.json"
          if [[ ! -f "$f" ]]; then
            f="$(find coverage -name coverage-summary.json -print -quit || true)"
          fi
          if [[ -z "$f" || ! -f "$f" ]]; then
            echo "coverage summary JSON not found under coverage/"
            exit 1
          fi
          python3 "${GITHUB_WORKSPACE}/scripts/ci/frontend_coverage_summary.py" "$f"

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          if-no-files-found: error

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Package frontend build artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        working-directory: frontend
        run: tar -czf app-dist.tar.gz -C dist .

      - name: Upload deployable frontend artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/app-dist.tar.gz
          if-no-files-found: error
