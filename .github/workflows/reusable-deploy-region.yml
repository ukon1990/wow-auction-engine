name: Reusable Deploy Region

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      backend_artifact_name:
        required: false
        type: string
        default: ""
      frontend_artifact_name:
        required: false
        type: string
      image_tag:
        required: true
        type: string
      app_name:
        required: true
        type: string
      environment:
        required: true
        type: string
      project_tag:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      blizzard_regions:
        required: true
        type: string
      instance_type:
        required: true
        type: string
      allowed_ingress_cidr:
        required: true
        type: string
      jvm_max_ram_percentage:
        required: true
        type: string
      container_port:
        required: true
        type: number
      health_check_path:
        required: true
        type: string
      instance_enabled:
        required: true
        type: string
      stack_name:
        required: true
        type: string
      root_domain_name:
        required: false
        type: string
        default: ""
      hosted_zone_id:
        required: false
        type: string
        default: ""
      regional_subdomain:
        required: false
        type: string
        default: ""
      cognito_issuer_uri:
        required: false
        type: string
        default: ""
      cognito_client_id:
        required: false
        type: string
        default: ""
      cognito_hosted_ui_base_url:
        required: false
        type: string
        default: ""
      run_infra_phase:
        required: false
        type: boolean
        default: true
      run_backend_rollout:
        required: false
        type: boolean
        default: true
      run_frontend_rollout:
        required: false
        type: boolean
        default: true
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true
      PROD_BLIZZARD_CLIENT_ID:
        required: true
      PROD_BLIZZARD_CLIENT_SECRET:
        required: true
      PROD_AUCTION_ENGINE_DB_URL:
        required: true
      PROD_AUCTION_ENGINE_DB_USERNAME:
        required: true
      PROD_AUCTION_ENGINE_DB_PASSWORD:
        required: true
      PROD_COGNITO_ISSUER_URI:
        required: false
      PROD_COGNITO_CLIENT_ID:
        required: false
      PROD_COGNITO_HOSTED_UI_BASE_URL:
        required: false
      PROD_AUTH_SESSION_SECRET:
        required: false
      PROD_AWS_ACCESS_KEY:
        required: false
      PROD_AWS_SECRET_KEY:
        required: false
      PROD_WAE_DYNAMODB_ENDPOINT:
        required: false
      PROD_WAE_S3_ENDPOINT:
        required: false
      PROD_JAVA_TOOL_OPTIONS:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Download backend image artifact
        if: ${{ inputs.run_backend_rollout }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.backend_artifact_name }}
          path: /tmp/backend-image-artifact

      - name: Download frontend image artifact
        if: ${{ inputs.run_frontend_rollout }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.frontend_artifact_name }}
          path: /tmp/frontend-image-artifact

      - name: Bootstrap AWS session
        uses: ./.github/actions/aws-bootstrap
        with:
          aws-role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Resolve account and image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          backend_repository_uri="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/${APP_NAME}"
          frontend_repository_uri="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/${APP_NAME}-frontend"
          backend_image_uri="${backend_repository_uri}:${IMAGE_TAG}"
          frontend_image_uri="${frontend_repository_uri}:${IMAGE_TAG}"
          parameter_prefix="/${APP_NAME}/${ENVIRONMENT}/${AWS_REGION}"
          echo "backend_repository_uri=$backend_repository_uri" >> "$GITHUB_OUTPUT"
          echo "frontend_repository_uri=$frontend_repository_uri" >> "$GITHUB_OUTPUT"
          echo "backend_image_uri=$backend_image_uri" >> "$GITHUB_OUTPUT"
          echo "frontend_image_uri=$frontend_image_uri" >> "$GITHUB_OUTPUT"
          echo "parameter_prefix=$parameter_prefix" >> "$GITHUB_OUTPUT"
        env:
          APP_NAME: ${{ inputs.app_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          AWS_REGION: ${{ inputs.aws_region }}
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Resolve default VPC and subnets
        if: ${{ inputs.run_infra_phase }}
        id: network
        shell: bash
        run: |
          set -euo pipefail
          vpc_id="$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text)"
          if [[ -z "$vpc_id" || "$vpc_id" == "None" ]]; then
            echo "No default VPC found in ${AWS_REGION}. Either create one or extend the template to pass explicit VPC/subnet IDs." >&2
            exit 1
          fi

          subnet_id="$(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${vpc_id}" Name=default-for-az,Values=true \
            --query 'Subnets[0].SubnetId' \
            --output text)"
          if [[ -z "$subnet_id" || "$subnet_id" == "None" ]]; then
            subnet_id="$(aws ec2 describe-subnets \
              --region "${AWS_REGION}" \
              --filters Name=vpc-id,Values="${vpc_id}" \
              --query 'Subnets[0].SubnetId' \
              --output text)"
          fi

          if [[ -z "$subnet_id" || "$subnet_id" == "None" ]]; then
            echo "No subnet found in default VPC ${vpc_id} in ${AWS_REGION}" >&2
            exit 1
          fi

          load_balancer_subnet_ids="$(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${vpc_id}" \
            --query 'Subnets[?MapPublicIpOnLaunch==`true`].SubnetId' \
            --output text | tr '\t' ',' || true)"
          if [[ -z "$load_balancer_subnet_ids" || "$load_balancer_subnet_ids" == "None" ]]; then
            load_balancer_subnet_ids="$(aws ec2 describe-subnets \
              --region "${AWS_REGION}" \
              --filters Name=vpc-id,Values="${vpc_id}" \
              --query 'Subnets[].SubnetId' \
              --output text | tr '\t' ',' || true)"
          fi

          if [[ -n "${ROOT_DOMAIN_NAME}" || -n "${HOSTED_ZONE_ID}" ]]; then
            if [[ -z "${ROOT_DOMAIN_NAME}" || -z "${HOSTED_ZONE_ID}" || -z "${REGIONAL_SUBDOMAIN}" ]]; then
              echo "root_domain_name, hosted_zone_id, and regional_subdomain must all be set for HTTPS." >&2
              exit 1
            fi
            subnet_count="$(awk -F',' '{ print NF }' <<< "$load_balancer_subnet_ids")"
            if (( subnet_count < 2 )); then
              echo "HTTPS requires at least two default VPC subnets for the regional load balancer." >&2
              exit 1
            fi
          fi

          echo "vpc_id=$vpc_id" >> "$GITHUB_OUTPUT"
          echo "subnet_id=$subnet_id" >> "$GITHUB_OUTPUT"
          echo "load_balancer_subnet_ids=$load_balancer_subnet_ids" >> "$GITHUB_OUTPUT"
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          ROOT_DOMAIN_NAME: ${{ inputs.root_domain_name }}
          HOSTED_ZONE_ID: ${{ inputs.hosted_zone_id }}
          REGIONAL_SUBDOMAIN: ${{ inputs.regional_subdomain }}

      - name: Recover failed stack state
        if: ${{ inputs.run_infra_phase }}
        shell: bash
        run: |
          set -euo pipefail
          stack_status="$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || true)"
          if [[ "$stack_status" == "UPDATE_ROLLBACK_FAILED" ]]; then
            echo "Continuing rollback for stack ${STACK_NAME} in ${stack_status}"
            aws cloudformation continue-update-rollback --region "${AWS_REGION}" --stack-name "${STACK_NAME}"
            aws cloudformation wait stack-rollback-complete --region "${AWS_REGION}" --stack-name "${STACK_NAME}"
            stack_status="$(aws cloudformation describe-stacks \
              --region "${AWS_REGION}" \
              --stack-name "${STACK_NAME}" \
              --query 'Stacks[0].StackStatus' \
              --output text)"
          fi
          if [[ "$stack_status" == "ROLLBACK_COMPLETE" || "$stack_status" == "ROLLBACK_FAILED" || "$stack_status" == "CREATE_FAILED" ]]; then
            echo "Deleting stack ${STACK_NAME} in ${stack_status} before redeploy"
            aws cloudformation delete-stack --region "${AWS_REGION}" --stack-name "${STACK_NAME}"
            aws cloudformation wait stack-delete-complete --region "${AWS_REGION}" --stack-name "${STACK_NAME}"
          fi
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          STACK_NAME: ${{ inputs.stack_name }}

      - name: Synchronize runtime parameters to SSM
        if: ${{ inputs.run_infra_phase }}
        shell: bash
        run: bash scripts/deploy/sync-ssm-parameters.sh
        env:
          APP_NAME: ${{ inputs.app_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          AWS_REGION: ${{ inputs.aws_region }}
          BLIZZARD_REGIONS: ${{ inputs.blizzard_regions }}
          JVM_MAX_RAM_PERCENTAGE: ${{ inputs.jvm_max_ram_percentage }}
          BLIZZARD_CLIENT_ID: ${{ secrets.PROD_BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.PROD_BLIZZARD_CLIENT_SECRET }}
          AUCTION_ENGINE_DB_URL: ${{ secrets.PROD_AUCTION_ENGINE_DB_URL }}
          AUCTION_ENGINE_DB_USERNAME: ${{ secrets.PROD_AUCTION_ENGINE_DB_USERNAME }}
          AUCTION_ENGINE_DB_PASSWORD: ${{ secrets.PROD_AUCTION_ENGINE_DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.PROD_AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.PROD_AWS_SECRET_KEY }}
          WAE_DYNAMODB_ENDPOINT: ${{ secrets.PROD_WAE_DYNAMODB_ENDPOINT }}
          WAE_S3_ENDPOINT: ${{ secrets.PROD_WAE_S3_ENDPOINT }}
          WAE_COGNITO_ISSUER_URI: ${{ secrets.PROD_COGNITO_ISSUER_URI }}
          WAE_COGNITO_CLIENT_ID: ${{ secrets.PROD_COGNITO_CLIENT_ID }}
          WAE_COGNITO_HOSTED_UI_BASE_URL: ${{ secrets.PROD_COGNITO_HOSTED_UI_BASE_URL }}
          WAE_AUTH_SESSION_SECRET: ${{ secrets.PROD_AUTH_SESSION_SECRET }}
          JAVA_TOOL_OPTIONS: ${{ secrets.PROD_JAVA_TOOL_OPTIONS }}

      - name: Deploy regional CloudFormation stack
        if: ${{ inputs.run_infra_phase }}
        shell: bash
        run: |
          set -euo pipefail
          if ! aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --template-file infra/cloudformation/app-region.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              AppName="${APP_NAME}" \
              Environment="${ENVIRONMENT}" \
              RegionCode="${AWS_REGION}" \
              ProjectTag="${PROJECT_TAG}" \
              InstanceType="${INSTANCE_TYPE}" \
              InstanceEnabled="${INSTANCE_ENABLED}" \
              ContainerPort="${CONTAINER_PORT}" \
              FrontendContainerPort="4000" \
              FrontendHostPort="80" \
              HealthCheckPath="${HEALTH_CHECK_PATH}" \
              AllowedIngressCidr="${ALLOWED_INGRESS_CIDR}" \
              JvmMaxRamPercentage="${JVM_MAX_RAM_PERCENTAGE}" \
              ParameterPathPrefix="${PARAMETER_PREFIX}" \
              VpcId="${VPC_ID}" \
              SubnetId="${SUBNET_ID}" \
              LoadBalancerSubnetIds="${LOAD_BALANCER_SUBNET_IDS}" \
              RootDomainName="${ROOT_DOMAIN_NAME}" \
              HostedZoneId="${HOSTED_ZONE_ID}" \
              RegionalSubdomain="${REGIONAL_SUBDOMAIN}" \
            --tags \
              Project="${PROJECT_TAG}" \
              Application="${APP_NAME}" \
              Environment="${ENVIRONMENT}" \
              Region="${AWS_REGION}"; then
            echo "CloudFormation deploy failed. Recent stack events:" >&2
            aws cloudformation describe-stack-events \
              --region "${AWS_REGION}" \
              --stack-name "${STACK_NAME}" \
              --query "StackEvents[0:20].[Timestamp,LogicalResourceId,ResourceStatus,ResourceStatusReason]" \
              --output table || true
            exit 1
          fi
        env:
          APP_NAME: ${{ inputs.app_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT_TAG: ${{ inputs.project_tag }}
          AWS_REGION: ${{ inputs.aws_region }}
          STACK_NAME: ${{ inputs.stack_name }}
          INSTANCE_TYPE: ${{ inputs.instance_type }}
          INSTANCE_ENABLED: ${{ inputs.instance_enabled }}
          CONTAINER_PORT: ${{ inputs.container_port }}
          HEALTH_CHECK_PATH: ${{ inputs.health_check_path }}
          ALLOWED_INGRESS_CIDR: ${{ inputs.allowed_ingress_cidr }}
          JVM_MAX_RAM_PERCENTAGE: ${{ inputs.jvm_max_ram_percentage }}
          PARAMETER_PREFIX: ${{ steps.meta.outputs.parameter_prefix }}
          BACKEND_IMAGE_URI: ${{ steps.meta.outputs.backend_image_uri }}
          FRONTEND_IMAGE_URI: ${{ steps.meta.outputs.frontend_image_uri }}
          VPC_ID: ${{ steps.network.outputs.vpc_id }}
          SUBNET_ID: ${{ steps.network.outputs.subnet_id }}
          LOAD_BALANCER_SUBNET_IDS: ${{ steps.network.outputs.load_balancer_subnet_ids }}
          ROOT_DOMAIN_NAME: ${{ inputs.root_domain_name }}
          HOSTED_ZONE_ID: ${{ inputs.hosted_zone_id }}
          REGIONAL_SUBDOMAIN: ${{ inputs.regional_subdomain }}

      - name: Log in to Amazon ECR
        if: ${{ inputs.run_backend_rollout || inputs.run_frontend_rollout }}
        uses: ./.github/actions/aws-bootstrap
        with:
          aws-role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          login-ecr: "true"

      - name: Publish backend image to regional ECR
        if: ${{ inputs.run_backend_rollout }}
        shell: bash
        run: |
          set -euo pipefail
          docker load --input "/tmp/backend-image-artifact/${ARTIFACT_NAME}.tar"
          docker tag "localbuild:backend-${IMAGE_TAG}" "${IMAGE_URI}"
          docker tag "localbuild:backend-${IMAGE_TAG}" "${REPOSITORY_URI}:master"
          docker push "${IMAGE_URI}"
          docker push "${REPOSITORY_URI}:master"
        env:
          ARTIFACT_NAME: ${{ inputs.backend_artifact_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_URI: ${{ steps.meta.outputs.backend_image_uri }}
          REPOSITORY_URI: ${{ steps.meta.outputs.backend_repository_uri }}

      - name: Publish frontend image to regional ECR
        if: ${{ inputs.run_frontend_rollout }}
        shell: bash
        run: |
          set -euo pipefail
          docker load --input "/tmp/frontend-image-artifact/${ARTIFACT_NAME}.tar"
          docker tag "localbuild:frontend-${IMAGE_TAG}" "${IMAGE_URI}"
          docker tag "localbuild:frontend-${IMAGE_TAG}" "${REPOSITORY_URI}:master"
          docker push "${IMAGE_URI}"
          docker push "${REPOSITORY_URI}:master"
        env:
          ARTIFACT_NAME: ${{ inputs.frontend_artifact_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_URI: ${{ steps.meta.outputs.frontend_image_uri }}
          REPOSITORY_URI: ${{ steps.meta.outputs.frontend_repository_uri }}

      - name: Resolve instance and base URL
        if: ${{ inputs.run_backend_rollout || inputs.run_frontend_rollout }}
        id: stack_outputs
        shell: bash
        run: |
          set -euo pipefail
          instance_id="$(aws cloudformation describe-stacks --region "${AWS_REGION}" --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='AppInstanceId'].OutputValue" --output text)"
          base_url="$(aws cloudformation describe-stacks --region "${AWS_REGION}" --stack-name "${STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='AppBaseUrl'].OutputValue" --output text)"
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          STACK_NAME: ${{ inputs.stack_name }}

      - name: Wait for SSM registration after infra changes
        if: ${{ (inputs.run_backend_rollout || inputs.run_frontend_rollout) && inputs.run_infra_phase }}
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            ping_status="$(aws ssm describe-instance-information --region "${AWS_REGION}" --filters "Key=InstanceIds,Values=${INSTANCE_ID}" --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || true)"
            if [[ "$ping_status" == "Online" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "Instance ${INSTANCE_ID} did not register with SSM in time" >&2
          exit 1
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          INSTANCE_ID: ${{ steps.stack_outputs.outputs.instance_id }}

      - name: Restart containers through SSM
        if: ${{ inputs.run_backend_rollout || inputs.run_frontend_rollout }}
        id: ssm
        shell: bash
        run: |
          set -euo pipefail
          script_b64="$(base64 -w 0 scripts/deploy/restart-container.sh)"
          export SCRIPT_B64="$script_b64"
          python3 - <<'PY' > /tmp/ssm-commands.json
          import json
          import os

          app_name = os.environ["APP_NAME"]
          aws_region = os.environ["AWS_REGION"]
          backend_image_uri = os.environ["BACKEND_IMAGE_URI"]
          frontend_image_uri = os.environ["FRONTEND_IMAGE_URI"]
          container_port = os.environ["CONTAINER_PORT"]
          environment = os.environ["ENVIRONMENT"]
          script_b64 = os.environ["SCRIPT_B64"]
          run_backend = os.environ["RUN_BACKEND_ROLLOUT"] == "true"
          run_frontend = os.environ["RUN_FRONTEND_ROLLOUT"] == "true"

          backend_name = f"{app_name}-backend"
          frontend_name = f"{app_name}-frontend"
          network_name = f"{app_name}-network"

          commands = [
              f"sudo /opt/{app_name}/bin/write-env-file.sh",
              f"echo {script_b64} | base64 -d | sudo tee /opt/{app_name}/bin/restart-container.sh > /dev/null",
              f"sudo chmod +x /opt/{app_name}/bin/restart-container.sh",
              f"sudo docker network create {network_name} >/dev/null 2>&1 || true",
          ]

          if run_backend:
              commands.append(
                  "sudo "
                  f"APP_NAME={backend_name} "
                  f"AWS_REGION={aws_region} "
                  f"IMAGE_URI={backend_image_uri} "
                  f"ENV_FILE_PATH=/opt/{app_name}/config/app.env "
                  f"CONTAINER_PORT={container_port} "
                  f"NETWORK_NAME={network_name} "
                  f"LOG_GROUP=/aws/ec2/{app_name}/{environment}/{aws_region} "
                  f"/opt/{app_name}/bin/restart-container.sh"
              )

          if run_frontend:
              commands.append(
                  "sudo "
                  f"APP_NAME={frontend_name} "
                  f"AWS_REGION={aws_region} "
                  f"IMAGE_URI={frontend_image_uri} "
                  "CONTAINER_PORT=4000 "
                  "HOST_PORT=80 "
                  f"NETWORK_NAME={network_name} "
                  f"BACKEND_ORIGIN=http://{backend_name}:{container_port} "
                  f"LOG_GROUP=/aws/ec2/{app_name}/{environment}/{aws_region} "
                  f"/opt/{app_name}/bin/restart-container.sh"
              )
          print(json.dumps({"commands": commands}))
          PY
          command_id="$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${APP_NAME}:${IMAGE_TAG}" \
            --parameters file:///tmp/ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
        env:
          APP_NAME: ${{ inputs.app_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          AWS_REGION: ${{ inputs.aws_region }}
          INSTANCE_ID: ${{ steps.stack_outputs.outputs.instance_id }}
          BACKEND_IMAGE_URI: ${{ steps.meta.outputs.backend_image_uri }}
          FRONTEND_IMAGE_URI: ${{ steps.meta.outputs.frontend_image_uri }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CONTAINER_PORT: ${{ inputs.container_port }}
          RUN_BACKEND_ROLLOUT: ${{ inputs.run_backend_rollout }}
          RUN_FRONTEND_ROLLOUT: ${{ inputs.run_frontend_rollout }}

      - name: Wait for SSM command success
        if: ${{ inputs.run_backend_rollout || inputs.run_frontend_rollout }}
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            status="$(aws ssm list-command-invocations --region "${AWS_REGION}" --command-id "${COMMAND_ID}" --details --query 'CommandInvocations[0].Status' --output text)"
            if [[ "$status" == "Success" ]]; then
              exit 0
            fi
            if [[ "$status" == "Cancelled" || "$status" == "Failed" || "$status" == "TimedOut" ]]; then
              aws ssm list-command-invocations --region "${AWS_REGION}" --command-id "${COMMAND_ID}" --details
              exit 1
            fi
            sleep 10
          done
          echo "SSM command ${COMMAND_ID} did not complete in time" >&2
          exit 1
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}

      - name: Verify backend health
        if: ${{ inputs.run_backend_rollout }}
        shell: bash
        run: |
          set -euo pipefail
          health_url="${BASE_URL}${HEALTH_CHECK_PATH}"
          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error --connect-timeout 5 --max-time 10 "$health_url" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed for ${health_url}" >&2
          exit 1
        env:
          BASE_URL: ${{ steps.stack_outputs.outputs.base_url }}
          HEALTH_CHECK_PATH: ${{ inputs.health_check_path }}

      - name: Verify frontend health
        if: ${{ inputs.run_frontend_rollout }}
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error --connect-timeout 5 --max-time 10 "$BASE_URL/" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Frontend health check failed for ${BASE_URL}/" >&2
          exit 1
        env:
          BASE_URL: ${{ steps.stack_outputs.outputs.base_url }}

      - name: Dump rollout diagnostics
        if: ${{ failure() && (inputs.run_backend_rollout || inputs.run_frontend_rollout) }}
        shell: bash
        run: |
          set -uo pipefail

          echo "=== Restart SSM command details ==="
          if [[ -n "${COMMAND_ID:-}" ]]; then
            aws ssm list-command-invocations \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --details || true
          else
            echo "No restart SSM command was created before the failure."
          fi

          echo "=== Container probe SSM command details ==="
          if [[ -n "${INSTANCE_ID:-}" && "$INSTANCE_ID" != "None" ]]; then
            script_b64="$(base64 -w 0 scripts/deploy/inspect-container-state.sh)"
            export SCRIPT_B64="$script_b64"
            python3 - <<'PY' > /tmp/container-probe-commands.json
          import json
          import os

          app_name = os.environ["APP_NAME"]
          script_b64 = os.environ["SCRIPT_B64"]

          commands = [
              f"echo {script_b64} | base64 -d > /tmp/inspect-container-state.sh",
              "chmod +x /tmp/inspect-container-state.sh",
              (
                  "sudo "
                  f"APP_NAME={app_name} "
                  f"CONTAINER_NAMES={app_name}-backend,{app_name}-frontend "
                  f"ENV_FILE_PATH=/opt/{app_name}/config/app.env "
                  "/tmp/inspect-container-state.sh"
              ),
          ]

          print(json.dumps({"commands": commands}))
          PY

            probe_command_id="$(aws ssm send-command \
              --region "${AWS_REGION}" \
              --instance-ids "${INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Inspect ${APP_NAME} container state" \
              --parameters file:///tmp/container-probe-commands.json \
              --query 'Command.CommandId' \
              --output text 2>/dev/null || true)"

            if [[ -n "${probe_command_id:-}" && "$probe_command_id" != "None" ]]; then
              for _ in $(seq 1 12); do
                status="$(aws ssm list-command-invocations --region "${AWS_REGION}" --command-id "${probe_command_id}" --details --query 'CommandInvocations[0].Status' --output text 2>/dev/null || true)"
                if [[ "$status" == "Success" || "$status" == "Cancelled" || "$status" == "Failed" || "$status" == "TimedOut" ]]; then
                  aws ssm list-command-invocations \
                    --region "${AWS_REGION}" \
                    --command-id "${probe_command_id}" \
                    --details || true
                  break
                fi
                sleep 5
              done
            else
              echo "Container probe could not be started through SSM."
            fi
          else
            echo "No instance id available for container probe."
          fi

          echo "=== Recent CloudWatch application logs ==="
          stream_name="$(aws logs describe-log-streams \
            --region "${AWS_REGION}" \
            --log-group-name "${LOG_GROUP}" \
            --order-by LastEventTime \
            --descending \
            --max-items 1 \
            --query 'logStreams[0].logStreamName' \
            --output text 2>/dev/null || true)"

          if [[ -n "$stream_name" && "$stream_name" != "None" ]]; then
            aws logs get-log-events \
              --region "${AWS_REGION}" \
              --log-group-name "${LOG_GROUP}" \
              --log-stream-name "$stream_name" \
              --limit 200 || true
          else
            echo "No CloudWatch log stream found in ${LOG_GROUP}"
          fi
        env:
          APP_NAME: ${{ inputs.app_name }}
          AWS_REGION: ${{ inputs.aws_region }}
          INSTANCE_ID: ${{ steps.stack_outputs.outputs.instance_id }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          LOG_GROUP: /aws/ec2/${{ inputs.app_name }}/${{ inputs.environment }}/${{ inputs.aws_region }}
