name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Validate Maven wrapper
        uses: apache/maven-wrapper-validator@v0.3.2

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Check Kotlin formatting
        run: ./mvnw -B -ntp ktlint:check

      - name: Run tests
        run: ./mvnw -B -ntp -Dkotlin.compiler.daemon=false test

      - name: Build package
        run: ./mvnw -B -ntp -Dkotlin.compiler.daemon=false -DskipTests package
