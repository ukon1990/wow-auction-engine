name: Backend PR Checks

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      backend_verify_required: ${{ steps.classify.outputs.backend_verify_required }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ steps.diff.outputs.base_sha }}"
          head_sha="${{ steps.diff.outputs.head_sha }}"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            git ls-tree -r --name-only "$head_sha" > /tmp/changed-files.txt
          elif git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            git diff --name-only "$base_sha" "$head_sha" > /tmp/changed-files.txt
          else
            echo "Base commit $base_sha is not available in this checkout; falling back to full repository classification." >&2
            git ls-tree -r --name-only "$head_sha" > /tmp/changed-files.txt
          fi
          classification="$(python scripts/deploy/classify_changes.py < /tmp/changed-files.txt)"
          echo "backend_verify_required=$(python -c "import json,sys; print(str(json.load(sys.stdin)['backend_verify_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"

  backend-build-and-test:
    name: Backend Style, Build, and Test
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.backend_verify_required == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw

      - name: Enforce Flyway schema guardrails
        run: ./scripts/ci/check-flyway-guardrails.sh

      - name: Verify backend
        run: ./mvnw -B -ntp -Dkotlin.compiler.daemon=false verify

      - name: Print backend coverage summary
        shell: bash
        run: |
          set -euo pipefail
          report="target/site/jacoco/jacoco.xml"
          if [[ ! -f "$report" ]]; then
            echo "Coverage report not found at $report"
            exit 1
          fi

          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          report = ET.parse("target/site/jacoco/jacoco.xml")
          root = report.getroot()
          line = next((c for c in root.findall("counter") if c.get("type") == "LINE"), None)
          if line is None:
              raise SystemExit("LINE counter not found in JaCoCo report")
          covered = int(line.get("covered", "0"))
          missed = int(line.get("missed", "0"))
          total = covered + missed
          pct = (covered / total * 100) if total else 0.0
          print(f"Backend line coverage: {covered}/{total} ({pct:.2f}%)")
          PY

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report
          path: |
            target/site/jacoco/jacoco.xml
            target/site/jacoco
          if-no-files-found: error

      - name: Upload deployable WAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-war
          path: target/*.war
          if-no-files-found: error
