name: Deploy Production

concurrency:
  group: >-
    deploy-production-${{
      github.event_name == 'workflow_run'
        && github.event.workflow_run.head_sha
        || github.sha
    }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_run:
    workflows:
      - App PR Checks
    types:
      - completed
  workflow_dispatch:
    inputs:
      ci_workflow_run_id:
        description: Optional App PR Checks run id to reuse backend-war and frontend-dist artifacts (omit to build from source in image jobs).
        required: false
        type: string
        default: ""
      force_app_rollout:
        description: Run backend and frontend rollouts even if change classification would skip them (does not force Cognito/infra).
        required: false
        type: boolean
        default: false

jobs:
  classify-changes:
    if: >-
      ${{
        (github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'master') ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/master')
      }}
    runs-on: ubuntu-latest
    outputs:
      app_rollout_required: ${{ steps.classify.outputs.app_rollout_required }}
      backend_rollout_required: ${{ steps.classify.outputs.backend_rollout_required }}
      frontend_rollout_required: ${{ steps.classify.outputs.frontend_rollout_required }}
      infra_apply_required: ${{ steps.classify.outputs.infra_apply_required }}
      relevant_changed: ${{ steps.classify.outputs.relevant_changed }}
      git_ref: ${{ steps.config.outputs.git_ref }}
      image_tag: ${{ steps.config.outputs.image_tag }}
      workflow_run_id: ${{ steps.config.outputs.workflow_run_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Read workflow context
        id: config
        shell: bash
        env:
          DISPATCH_CI_RUN_ID: ${{ github.event.inputs.ci_workflow_run_id || '' }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "git_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "workflow_run_id=${DISPATCH_CI_RUN_ID}" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "workflow_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed files
        id: classify
        shell: bash
        env:
          FORCE_APP_ROLLOUT: ${{ github.event.inputs.force_app_rollout }}
        run: |
          set -euo pipefail
          parent_sha="$(git rev-list --parents -n 1 HEAD | awk '{print $2}')"
          if [[ -z "$parent_sha" ]]; then
            git ls-tree -r --name-only HEAD > /tmp/changed-files.txt
          else
            git diff --name-only "$parent_sha" HEAD > /tmp/changed-files.txt
          fi
          classification="$(python3 scripts/deploy/classify_changes.py < /tmp/changed-files.txt)"
          echo "app_rollout_required=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['app_rollout_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "backend_rollout_required=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['backend_rollout_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "frontend_rollout_required=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['frontend_rollout_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "infra_apply_required=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['infra_apply_required']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "relevant_changed=$(python3 -c "import json,sys; print(str(json.load(sys.stdin)['relevant_changed']).lower())" <<< "$classification")" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${FORCE_APP_ROLLOUT:-}" == "true" ]]; then
            echo "app_rollout_required=true" >> "$GITHUB_OUTPUT"
            echo "backend_rollout_required=true" >> "$GITHUB_OUTPUT"
            echo "frontend_rollout_required=true" >> "$GITHUB_OUTPUT"
            echo "relevant_changed=true" >> "$GITHUB_OUTPUT"
          fi

  load-regions:
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.relevant_changed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      app_name: ${{ steps.config.outputs.app_name }}
      environment: ${{ steps.config.outputs.environment }}
      project_tag: ${{ steps.config.outputs.project_tag }}
      auth_region: ${{ steps.config.outputs.auth_region }}
      auth_stack_name: ${{ steps.config.outputs.auth_stack_name }}
      auth_domain_prefix: ${{ steps.config.outputs.auth_domain_prefix }}
      root_domain_name: ${{ steps.config.outputs.root_domain_name }}
      hosted_zone_id: ${{ steps.config.outputs.hosted_zone_id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.classify-changes.outputs.git_ref }}

      - name: Read deployment defaults
        id: config
        shell: bash
        run: |
          set -euo pipefail
          app_name="$(python3 -c "import json; print(json.load(open('infra/regions.json'))['app_name'])")"
          environment="$(python3 -c "import json; print(json.load(open('infra/regions.json'))['environment'])")"
          project_tag="$(python3 -c "import json; print(json.load(open('infra/regions.json'))['project_tag'])")"
          auth_region="$(python3 -c "import json; print(json.load(open('infra/regions.json')).get('auth_region', 'eu-north-1'))")"
          auth_stack_name="$(python3 -c "import json; print(json.load(open('infra/regions.json')).get('auth_stack_name', ''))")"
          auth_domain_prefix="$(python3 -c "import json; print(json.load(open('infra/regions.json')).get('auth_domain_prefix', ''))")"
          root_domain_name="$(python3 -c "import json; print(json.load(open('infra/regions.json')).get('root_domain_name', ''))")"
          hosted_zone_id="$(python3 -c "import json; print(json.load(open('infra/regions.json')).get('hosted_zone_id', ''))")"
          if [[ -z "$root_domain_name" && -n "${ROOT_DOMAIN_NAME_OVERRIDE:-}" ]]; then
            root_domain_name="$ROOT_DOMAIN_NAME_OVERRIDE"
          fi
          if [[ -z "$hosted_zone_id" && -n "${HOSTED_ZONE_ID_OVERRIDE:-}" ]]; then
            hosted_zone_id="$HOSTED_ZONE_ID_OVERRIDE"
          fi
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "project_tag=$project_tag" >> "$GITHUB_OUTPUT"
          echo "auth_region=$auth_region" >> "$GITHUB_OUTPUT"
          echo "auth_stack_name=$auth_stack_name" >> "$GITHUB_OUTPUT"
          echo "auth_domain_prefix=$auth_domain_prefix" >> "$GITHUB_OUTPUT"
          echo "root_domain_name=$root_domain_name" >> "$GITHUB_OUTPUT"
          echo "hosted_zone_id=$hosted_zone_id" >> "$GITHUB_OUTPUT"
        env:
          ROOT_DOMAIN_NAME_OVERRIDE: ${{ vars.PROD_ROOT_DOMAIN_NAME }}
          HOSTED_ZONE_ID_OVERRIDE: ${{ vars.PROD_HOSTED_ZONE_ID }}

      - name: Render enabled region matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          matrix_json="$(python3 scripts/deploy/render_regions_matrix.py)"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  build-backend-image:
    needs:
      - classify-changes
      - load-regions
    if: ${{ needs.classify-changes.outputs.backend_rollout_required == 'true' }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      git_ref: ${{ needs.classify-changes.outputs.git_ref }}
      workflow_run_id: ${{ needs.classify-changes.outputs.workflow_run_id }}
      image_tag: ${{ needs.classify-changes.outputs.image_tag }}
      image_platform: linux/arm64
      service: backend

  build-frontend-image:
    needs:
      - classify-changes
      - load-regions
    if: ${{ needs.classify-changes.outputs.frontend_rollout_required == 'true' }}
    uses: ./.github/workflows/reusable-build-image.yml
    with:
      git_ref: ${{ needs.classify-changes.outputs.git_ref }}
      workflow_run_id: ${{ needs.classify-changes.outputs.workflow_run_id }}
      image_tag: ${{ needs.classify-changes.outputs.image_tag }}
      image_platform: linux/arm64
      service: frontend

  deploy-auth:
    needs:
      - classify-changes
      - load-regions
    if: ${{ needs.classify-changes.outputs.infra_apply_required == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cognito_issuer_uri: ${{ steps.outputs.outputs.cognito_issuer_uri }}
      cognito_client_id: ${{ steps.outputs.outputs.cognito_client_id }}
      cognito_hosted_ui_base_url: ${{ steps.outputs.outputs.cognito_hosted_ui_base_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.classify-changes.outputs.git_ref }}

      - name: Bootstrap AWS auth session
        uses: ./.github/actions/aws-bootstrap
        with:
          aws-role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ needs.load-regions.outputs.auth_region }}

      - name: Deploy Cognito auth stack
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${AUTH_REGION}" != "eu-north-1" ]]; then
            echo "Cognito auth stack must deploy in eu-north-1; got ${AUTH_REGION}" >&2
            exit 1
          fi
          if [[ -z "${AUTH_STACK_NAME}" || -z "${AUTH_DOMAIN_PREFIX}" ]]; then
            echo "auth_stack_name and auth_domain_prefix must be set in infra/regions.json" >&2
            exit 1
          fi
          if [[ -n "${ROOT_DOMAIN_NAME}" && -z "${HOSTED_ZONE_ID}" ]] || [[ -z "${ROOT_DOMAIN_NAME}" && -n "${HOSTED_ZONE_ID}" ]]; then
            echo "root_domain_name and hosted_zone_id must both be set to enable regional HTTPS, or both be blank to deploy without a custom domain." >&2
            exit 1
          fi
          callback_urls="$(python3 - <<'PY'
          import json
          import os
          data = json.load(open("infra/regions.json", encoding="utf-8"))
          root = os.environ["ROOT_DOMAIN_NAME"].strip(".")
          urls = [
              "http://localhost:4000/auth/callback",
              "http://127.0.0.1:4000/auth/callback",
              "https://ee.jonaskf.net/auth/callback",
          ]
          if root:
              for region in data["regions"]:
                  if region.get("enabled", False):
                      subdomain = region.get("regional_subdomain", "").strip(".")
                      if not subdomain:
                          raise SystemExit("Every enabled region needs regional_subdomain")
                      urls.append(f"https://{subdomain}.{root}/auth/callback")
          print(",".join(urls))
          PY
          )"
          logout_urls="$(python3 - <<'PY'
          import json
          import os
          data = json.load(open("infra/regions.json", encoding="utf-8"))
          root = os.environ["ROOT_DOMAIN_NAME"].strip(".")
          urls = [
              "http://localhost:4000/",
              "http://127.0.0.1:4000/",
              "https://ee.jonaskf.net/",
          ]
          if root:
              for region in data["regions"]:
                  if region.get("enabled", False):
                      subdomain = region.get("regional_subdomain", "").strip(".")
                      if not subdomain:
                          raise SystemExit("Every enabled region needs regional_subdomain")
                      urls.append(f"https://{subdomain}.{root}/")
          print(",".join(urls))
          PY
          )"

          aws cloudformation deploy \
            --region "${AUTH_REGION}" \
            --stack-name "${AUTH_STACK_NAME}" \
            --template-file infra/cloudformation/auth.yaml \
            --parameter-overrides \
              AppName="${APP_NAME}" \
              Environment="${ENVIRONMENT}" \
              ProjectTag="${PROJECT_TAG}" \
              AuthDomainPrefix="${AUTH_DOMAIN_PREFIX}" \
              CallbackUrls="${callback_urls}" \
              LogoutUrls="${logout_urls}" \
            --tags \
              Project="${PROJECT_TAG}" \
              Application="${APP_NAME}" \
              Environment="${ENVIRONMENT}" \
              Region="${AUTH_REGION}"
        env:
          APP_NAME: ${{ needs.load-regions.outputs.app_name }}
          ENVIRONMENT: ${{ needs.load-regions.outputs.environment }}
          PROJECT_TAG: ${{ needs.load-regions.outputs.project_tag }}
          AUTH_REGION: ${{ needs.load-regions.outputs.auth_region }}
          AUTH_STACK_NAME: ${{ needs.load-regions.outputs.auth_stack_name }}
          AUTH_DOMAIN_PREFIX: ${{ needs.load-regions.outputs.auth_domain_prefix }}
          ROOT_DOMAIN_NAME: ${{ needs.load-regions.outputs.root_domain_name }}
          HOSTED_ZONE_ID: ${{ needs.load-regions.outputs.hosted_zone_id }}

      - name: Read auth stack outputs
        id: outputs
        shell: bash
        run: |
          set -euo pipefail
          output_value() {
            aws cloudformation describe-stacks \
              --region "${AUTH_REGION}" \
              --stack-name "${AUTH_STACK_NAME}" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }
          echo "cognito_issuer_uri=$(output_value IssuerUri)" >> "$GITHUB_OUTPUT"
          echo "cognito_client_id=$(output_value UserPoolClientId)" >> "$GITHUB_OUTPUT"
          echo "cognito_hosted_ui_base_url=$(output_value HostedUiBaseUrl)" >> "$GITHUB_OUTPUT"
        env:
          AUTH_REGION: ${{ needs.load-regions.outputs.auth_region }}
          AUTH_STACK_NAME: ${{ needs.load-regions.outputs.auth_stack_name }}

  deploy-region:
    needs:
      - classify-changes
      - load-regions
      - build-backend-image
      - build-frontend-image
      - deploy-auth
    if: ${{ always() && needs.classify-changes.outputs.app_rollout_required == 'true' && !failure() && !cancelled() }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJson(needs.load-regions.outputs.matrix) }}
    uses: ./.github/workflows/reusable-deploy-region.yml
    with:
      git_ref: ${{ needs.classify-changes.outputs.git_ref }}
      backend_artifact_name: ${{ needs.build-backend-image.outputs.artifact_name }}
      frontend_artifact_name: ${{ needs.build-frontend-image.outputs.artifact_name }}
      image_tag: ${{ needs.classify-changes.outputs.image_tag }}
      app_name: ${{ needs.load-regions.outputs.app_name }}
      environment: ${{ needs.load-regions.outputs.environment }}
      project_tag: ${{ needs.load-regions.outputs.project_tag }}
      aws_region: ${{ matrix.aws_region }}
      blizzard_regions: ${{ join(matrix.blizzard_regions, ',') }}
      instance_type: ${{ matrix.instance_type }}
      allowed_ingress_cidr: ${{ matrix.allowed_ingress_cidr }}
      jvm_max_ram_percentage: ${{ matrix.jvm_max_ram_percentage }}
      container_port: ${{ matrix.container_port }}
      health_check_path: ${{ matrix.health_check_path }}
      instance_enabled: ${{ matrix.instance_enabled }}
      stack_name: ${{ matrix.stack_name }}
      root_domain_name: ${{ needs.load-regions.outputs.root_domain_name }}
      hosted_zone_id: ${{ needs.load-regions.outputs.hosted_zone_id }}
      regional_subdomain: ${{ matrix.regional_subdomain }}
      cognito_issuer_uri: ${{ needs.deploy-auth.outputs.cognito_issuer_uri }}
      cognito_client_id: ${{ needs.deploy-auth.outputs.cognito_client_id }}
      cognito_hosted_ui_base_url: ${{ needs.deploy-auth.outputs.cognito_hosted_ui_base_url }}
      run_infra_phase: ${{ needs.classify-changes.outputs.infra_apply_required == 'true' }}
      run_backend_rollout: ${{ needs.classify-changes.outputs.backend_rollout_required == 'true' && matrix.instance_enabled == 'true' }}
      run_frontend_rollout: ${{ needs.classify-changes.outputs.frontend_rollout_required == 'true' && matrix.instance_enabled == 'true' }}
    secrets: inherit
