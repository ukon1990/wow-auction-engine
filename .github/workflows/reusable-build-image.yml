name: Reusable Build Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  actions: read

on:
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      workflow_run_id:
        required: false
        type: string
      image_tag:
        required: true
        type: string
    outputs:
      artifact_name:
        description: Uploaded Docker image artifact name
        value: ${{ jobs.build.outputs.artifact_name }}
      image_tag:
        description: Built image tag
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${IMAGE_TAG:0:12}"
          artifact_name="app-image-${short_sha}"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Ensure WAR artifact is available
        shell: bash
        run: bash scripts/deploy/ensure-war.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ inputs.workflow_run_id }}

      - name: Build ARM64 Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --tag "localbuild:${IMAGE_TAG}" \
            --load \
            .
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Export Docker image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker save "localbuild:${IMAGE_TAG}" -o "/tmp/${ARTIFACT_NAME}.tar"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ARTIFACT_NAME: ${{ steps.meta.outputs.artifact_name }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: /tmp/${{ steps.meta.outputs.artifact_name }}.tar
          if-no-files-found: error

      - name: Remove transient WAR file
        if: always()
        shell: bash
        run: rm -f ./app.war
