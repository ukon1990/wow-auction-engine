name: Reusable Build Image

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    outputs:
      artifact_name:
        description: Uploaded Docker image artifact name
        value: ${{ jobs.build.outputs.artifact_name }}
      image_tag:
        description: Built image tag
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${IMAGE_TAG:0:12}"
          artifact_name="app-image-${short_sha}"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Build ARM64 Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --tag "localbuild:${IMAGE_TAG}" \
            --load \
            .
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}

      - name: Export Docker image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker save "localbuild:${IMAGE_TAG}" -o "/tmp/${ARTIFACT_NAME}.tar"
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ARTIFACT_NAME: ${{ steps.meta.outputs.artifact_name }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: /tmp/${{ steps.meta.outputs.artifact_name }}.tar
          if-no-files-found: error
