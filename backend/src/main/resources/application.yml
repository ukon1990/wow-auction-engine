spring:
  application:
    name: auction-engine
  cloud:
    aws:
      region:
        static: ${WAE_AWS_REGION:eu-north-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY:local-dev-key}
        secret-key: ${AWS_SECRET_KEY:local-dev-secret}
      cognito:
        pool_id: ${WAE_COGNITO_USER_POOL_ID}
      dynamodb:
        endpoint: "http://localhost:4566"
      s3:
        endpoint: "http://localhost:4566"
        bootstrap-enabled: true
  datasource:
    url: "jdbc:mariadb://localhost:59000/dbo?serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true"
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 200
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${WAE_COGNITO_ISSUER_URI:}
server:
  servlet:
    context-path: /api

app:
  scheduling:
    enabled: true
    static-data-sync-enabled: ${WAE_STATIC_DATA_SYNC_ENABLED:true}
    initial-delay: PT30S
    item-sync-cron: "0 0 * * * *"
    item-sync-zone: GMT+1
    item-sync-startup-delay: PT30S
    item-sync-startup-repeat-delay: P3650D

    profession-recipe-sync-cron: "0 0 8 ? * WED"
    profession-recipe-sync-zone: GMT+1
    profession-recipe-sync-startup-delay: PT30S
    profession-recipe-sync-startup-repeat-delay: P3650D

    deleted-auction-cleanup-cron: "0 0 4 * * *"
    deleted-auction-cleanup-zone: GMT+1
    deleted-auction-cleanup:
      enabled: ${WAE_DELETED_AUCTION_CLEANUP_ENABLED:true}
      hourly-retention: ${WAE_DELETED_AUCTION_CLEANUP_HOURLY_RETENTION:P14D}
      daily-retention: ${WAE_DELETED_AUCTION_CLEANUP_DAILY_RETENTION:P120D}
      price-retention: ${WAE_DELETED_AUCTION_CLEANUP_PRICE_RETENTION:P7D}
      batch-size: ${WAE_DELETED_AUCTION_CLEANUP_BATCH_SIZE:10000}
      dry-run: ${WAE_DELETED_AUCTION_CLEANUP_DRY_RUN:false}
      optimize-enabled: ${WAE_DELETED_AUCTION_CLEANUP_OPTIMIZE_ENABLED:false}
  health:
    stuck-update-threshold: PT20M

  media-backfill:
    # Limit parallel Blizzard media API calls (each row may perform metadata + asset download).
    concurrency: 3
    # Small delay between starting work items to reduce burst traffic (0 to disable).
    start-delay-ms: 50

blizzard:
  client-id: ${BLIZZARD_CLIENT_ID}
  client-secret: ${BLIZZARD_CLIENT_SECRET}
  regions: ${WAE_BLIZZARD_REGIONS:${WAE_BLIZZARD_REGION}}
  static-data-region: ${WAE_STATIC_DATA_REGION:Europe}
  token-url: https://eu.battle.net/oauth/token
  base-url: api.blizzard.com/data/wow/

wae:
  s3:
    buckets:
      northamerica:
        name: wah-data-us
        bucket-region: us-west-1
      europe:
        name: wah-data-eu
        bucket-region: eu-west-1 # Sticking with eu-west-1 instead of re-generating everything  when I move to eu-north-1
      korea:
        name: wah-data-as
        bucket-region: ap-northeast-2
      taiwan:
        name: wah-data-as
        bucket-region: ap-northeast-2
