openapi: 3.0.3
info:
  title: WoW Auction Engine API
  version: 0.0.1
  description: Public API for WoW Auction Engine.
servers:
  - url: /api
    description: Same origin
  - url: http://localhost:8080/api
    description: Local backend (direct)
tags:
  - name: Health
    description: Runtime health endpoints.
  - name: Admin
    description: Endpoints for administrating users and data.
  - name: Realm
    description: Realm catalog and per-realm auction house status.
  - name: AuctionMarket
    description: Auction market search and filter metadata.
  - name: CraftingMarket
    description: Crafting market search and filter metadata.
  - name: Profile
    description: Authenticated character profession profiles.
paths:
  /health:
    $ref: ./paths/health.yml#/health
  /admin/users:
    $ref: ./paths/admin.yml#/getUsers
  /admin/status:
    $ref: ./paths/admin.yml#/getStatus
  /admin/sql/execute:
    $ref: ./paths/admin.yml#/executeAdminSql
  /admin/sql/metadata:
    $ref: ./paths/admin.yml#/getAdminSqlMetadata
  /admin/expansions:
    $ref: ./paths/admin.yml#/listExpansions
  /admin/expansions/{id}:
    $ref: ./paths/admin.yml#/expansionById
  /admin/expansion-ranges:
    $ref: ./paths/admin.yml#/expansionRanges
  /admin/expansion-ranges/{id}:
    $ref: ./paths/admin.yml#/expansionRangeById
  /admin/expansion-ranges/apply:
    $ref: ./paths/admin.yml#/applyExpansionRanges
  /admin/expansion-ranges/fetch-missing-items:
    $ref: ./paths/admin.yml#/fetchMissingExpansionRangeItems
  /admin/professions/sync:
    $ref: ./paths/admin.yml#/syncProfessionRecipes
  /admin/professions/sync/active:
    $ref: ./paths/admin.yml#/getActiveProfessionSyncJob
  /admin/profession-talent-trees/import:
    $ref: ./paths/admin.yml#/importProfessionTalentTrees
  /admin/profession-talent-trees/inspect-normalized:
    $ref: ./paths/admin.yml#/inspectNormalizedAuctionHelperProfessionData
  /admin/jobs/{id}:
    $ref: ./paths/admin.yml#/getAdminJob
  /admin/items:
    $ref: ./paths/admin.yml#/adminItems
  /admin/items/{id}:
    $ref: ./paths/admin.yml#/adminItemById
  /admin/items/{id}/override:
    $ref: ./paths/admin.yml#/adminItemOverride
  /admin/items/{id}/recipes/{recipeId}:
    $ref: ./paths/admin.yml#/adminItemRecipeAssociation
  /admin/items/{id}/compare-api:
    $ref: ./paths/admin.yml#/adminItemCompareApi
  /admin/items/bulk-overrides:
    $ref: ./paths/admin.yml#/adminItemBulkOverrides
  /admin/recipes:
    $ref: ./paths/admin.yml#/adminRecipes
  /admin/recipes/{id}:
    $ref: ./paths/admin.yml#/adminRecipeById
  /admin/recipes/{id}/override:
    $ref: ./paths/admin.yml#/adminRecipeOverride
  /admin/recipes/{id}/compare-api:
    $ref: ./paths/admin.yml#/adminRecipeCompareApi
  /admin/recipes/bulk-overrides:
    $ref: ./paths/admin.yml#/adminRecipeBulkOverrides
  /realms:
    $ref: ./paths/realm.yml#/listRealms
  /realms/{region}/{slug}:
    $ref: ./paths/realm.yml#/getRealm
  /auctions/search:
    $ref: ./paths/auction.yml#/search
  /auctions/search/filters:
    $ref: ./paths/auction.yml#/filters
  /auctions/items/detail:
    $ref: ./paths/auction.yml#/getAuctionItemDetail
  /crafting/items/analytics:
    $ref: ./paths/auction.yml#/getAuctionItemCraftingAnalytics
  /crafting/search:
    $ref: ./paths/crafting.yml#/search
  /crafting/filters:
    $ref: ./paths/crafting.yml#/filters
  /profile/professions/trees:
    $ref: ./paths/profile.yml#/listProfessionTrees
  /profile/characters:
    $ref: ./paths/profile.yml#/characters
  /profile/characters/professions-preview:
    $ref: ./paths/profile.yml#/characterProfessionPreview
  /profile/characters/{characterId}:
    $ref: ./paths/profile.yml#/characterById
  /profile/characters/{characterId}/professions/{professionId}:
    $ref: ./paths/profile.yml#/characterProfessionProfile
