openapi: 3.0.3
info:
  title: WoW Auction Engine API
  version: 0.0.1
  description: Public API for WoW Auction Engine.
servers:
  - url: http://localhost:8080/api
    description: Local backend
  - url: /api
    description: Same origin
tags:
  - name: Health
    description: Runtime health endpoints.
  - name: Realm
    description: Realm catalog and per-realm auction house status.
  - name: AuctionMarket
    description: Auction market search and filter metadata.
  - name: CraftingMarket
    description: Crafting market search and filter metadata.
paths:
  /health:
    $ref: ./paths/health.yml#/health
  /realms:
    $ref: ./paths/realm.yml#/listRealms
  /realms/{region}/{slug}:
    $ref: ./paths/realm.yml#/getRealm
  /auctions/search:
    $ref: ./paths/auction.yml#/search
  /auctions/search/filters:
    $ref: ./paths/auction.yml#/filters
  /auctions/items/detail:
    $ref: ./paths/auction.yml#/getAuctionItemDetail
  /crafting/items/analytics:
    $ref: ./paths/auction.yml#/getAuctionItemCraftingAnalytics
  /crafting/search:
    $ref: ./paths/crafting.yml#/search
  /crafting/filters:
    $ref: ./paths/crafting.yml#/filters
