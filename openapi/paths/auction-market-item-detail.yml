get:
    tags:
        - AuctionMarket
    operationId: getAuctionMarketItemDetail
    summary: Item Codex detail for one market listing bucket
    description: >
        Returns charts, summary metrics, and optional crafting economics for one item.
        Snapshot date/hour match market search. Variant query params scope stats to one
        auction_stats_hourly row; omit them for item-wide rollup.
    parameters:
        - name: region
          in: query
          required: true
          schema:
              type: string
              enum: [us, eu, kr, tw]
        - name: realmSlug
          in: query
          required: true
          schema:
              type: string
        - name: itemId
          in: query
          required: true
          schema:
              type: integer
              format: int32
        - name: bonusKey
          in: query
          required: false
          schema:
              type: string
              default: ""
        - name: modifierKey
          in: query
          required: false
          schema:
              type: string
              default: ""
        - name: petSpeciesId
          in: query
          required: false
          schema:
              type: integer
              format: int32
              default: 0
        - name: scope
          in: query
          required: false
          schema:
              type: string
              enum: [realm, commodity]
              default: realm
        - name: locale
          in: query
          required: false
          schema:
              type: string
    responses:
        "200":
            description: Item detail payload.
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/auction-market-item-detail-response.yml
        "400":
            description: Invalid request.
        "404":
            description: Realm or item context not found.
