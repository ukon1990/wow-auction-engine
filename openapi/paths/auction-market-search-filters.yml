get:
  tags:
    - AuctionMarket
  operationId: getAuctionMarketFilters
  summary: Return market search filter definitions
  description: Returns database-derived filters for the selected realm and locale.
  parameters:
    - name: region
      in: query
      required: true
      schema:
        type: string
        enum: [us, eu, kr, tw]
    - name: realmSlug
      in: query
      required: true
      schema:
        type: string
    - name: locale
      in: query
      required: false
      schema:
        type: string
      description: Optional locale override. Defaults to the selected realm locale.
  responses:
    "200":
      description: Filter definitions.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/auction-market-filter-response.yml
    "400":
      description: Invalid filter request.
    "404":
      description: Realm was not found.
