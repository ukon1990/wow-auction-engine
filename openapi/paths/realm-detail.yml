get:
  tags:
    - Realm
  operationId: getRealm
  summary: Get a single realm with its connected-realm and community auction-house status
  parameters:
    - name: region
      in: path
      required: true
      schema:
        type: string
        enum: [us, eu, kr, tw]
    - name: slug
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Realm detail including the parent connected realm's auction house status and the regional community auction house status.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/realm-detail.yml
    "404":
      description: No realm exists for the given region and slug, or the regional community placeholder has not been seeded yet.
