get:
  tags:
    - AuctionMarket
  operationId: searchAuctionMarket
  summary: Search auction market items for a selected realm
  description: Returns paginated item market rows. Snapshot date and hour are derived from auction house state.
  parameters:
    - name: region
      in: query
      required: true
      schema:
        type: string
        enum: [us, eu, kr, tw]
    - name: realmSlug
      in: query
      required: true
      schema:
        type: string
    - name: locale
      in: query
      required: false
      schema:
        type: string
      description: Optional locale override. Defaults to the selected realm locale.
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    - name: sortBy
      in: query
      required: false
      schema:
        type: string
        default: itemName
        enum:
          - itemName
          - quality
          - itemClass
          - itemSubclass
          - selectedPrice
          - commodityPrice
          - selectedQuantity
          - commodityQuantity
    - name: sortDirection
      in: query
      required: false
      schema:
        type: string
        default: asc
        enum: [asc, desc]
    - name: query
      in: query
      required: false
      schema:
        type: string
    - name: qualityIds
      in: query
      required: false
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
    - name: itemClassIds
      in: query
      required: false
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
    - name: itemSubclassIds
      in: query
      required: false
      schema:
        type: array
        items:
          type: integer
      style: form
      explode: true
    - name: recipeOnly
      in: query
      required: false
      schema:
        type: boolean
    - name: minPrice
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
    - name: maxPrice
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
    - name: minQuantity
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
    - name: maxQuantity
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
  responses:
    "200":
      description: Paginated market search results.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/auction-market-search-page.yml
    "400":
      description: Invalid search request.
    "404":
      description: Realm was not found.
