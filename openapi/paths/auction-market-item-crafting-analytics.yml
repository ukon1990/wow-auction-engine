get:
    tags:
        - AuctionMarket
    operationId: getAuctionMarketItemCraftingAnalytics
    summary: 14-day crafting economics for one item recipe
    parameters:
        - name: region
          in: query
          required: true
          schema:
              type: string
              enum: [us, eu, kr, tw]
        - name: realmSlug
          in: query
          required: true
          schema:
              type: string
        - name: itemId
          in: query
          required: true
          schema:
              type: integer
              format: int32
        - name: recipeId
          in: query
          required: true
          schema:
              type: integer
              format: int32
        - name: bonusKey
          in: query
          required: false
          schema:
              type: string
              default: ""
        - name: modifierKey
          in: query
          required: false
          schema:
              type: string
              default: ""
        - name: petSpeciesId
          in: query
          required: false
          schema:
              type: integer
              format: int32
              default: 0
        - name: locale
          in: query
          required: false
          schema:
              type: string
    responses:
        "200":
            description: Crafting analytics payload.
            content:
                application/json:
                    schema:
                        $ref: ../components/schemas/auction-market-item-crafting-analytics-response.yml
        "400":
            description: Invalid request.
        "404":
            description: Realm, item, or recipe context not found.
