health:
  get:
    tags:
      - Health
    operationId: health
    summary: Check runtime health
    description: Returns no content when the service is healthy, or a bare 503 when runtime health checks fail.
    responses:
      "204":
        description: The application is healthy.
        headers:
          X-Correlation-ID:
            $ref: ../components/headers/correlation-id.yml
          X-Client-Session-ID:
            $ref: ../components/headers/client-session-id.yml
      "503":
        description: The application is running but unhealthy.
        headers:
          X-Correlation-ID:
            $ref: ../components/headers/correlation-id.yml
          X-Client-Session-ID:
            $ref: ../components/headers/client-session-id.yml
