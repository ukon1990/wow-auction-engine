search:
  get:
    tags:
      - CraftingMarket
    operationId: search
    summary: Search crafting recipes with per-variant pricing and ROI
    description: Returns paginated recipe rows, one per crafted output AH variant at the realm snapshot hour.
    parameters:
      - name: region
        in: query
        required: true
        schema:
          type: string
          enum: [us, eu, kr, tw]
      - name: realmSlug
        in: query
        required: true
        schema:
          type: string
      - name: locale
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          default: itemName
          enum:
            - itemName
            - recipeName
            - professionName
            - reagentCost
            - outputPrice
            - profit
            - roiPercent
            - outputPriceChangePercent
            - profitChangePercent
            - listingQuantity
      - name: sortDirection
        in: query
        required: false
        schema:
          type: string
          default: asc
          enum: [asc, desc]
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: professionIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
            format: int32
        style: form
        explode: true
      - name: minProfit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: maxProfit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: minRoiPercent
        in: query
        required: false
        schema:
          type: number
          format: double
      - name: maxRoiPercent
        in: query
        required: false
        schema:
          type: number
          format: double
      - name: minReagentCost
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: maxReagentCost
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: minOutputPrice
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: maxOutputPrice
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: minOutputPriceChangePercent
        in: query
        required: false
        schema:
          type: number
          format: double
      - name: maxOutputPriceChangePercent
        in: query
        required: false
        schema:
          type: number
          format: double
      - name: requireCompleteReagentPricing
        in: query
        required: false
        schema:
          type: boolean
          default: false
    responses:
      "200":
        description: Paginated crafting search results.
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/CraftingMarketSearchPage"
      "400":
        description: Invalid search request.
      "404":
        description: Realm was not found.

filters:
  get:
    tags:
      - CraftingMarket
    operationId: filters
    summary: Return crafting search filter definitions
    description: Returns profession options for crafting market filters.
    parameters:
      - name: region
        in: query
        required: true
        schema:
          type: string
          enum: [us, eu, kr, tw]
      - name: realmSlug
        in: query
        required: true
        schema:
          type: string
      - name: locale
        in: query
        required: false
        schema:
          type: string
    responses:
      "200":
        description: Filter definitions.
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/AuctionMarketFilterResponse"
      "400":
        description: Invalid filter request.
      "404":
        description: Realm was not found.
