getUsers:
    get:
        tags:
            - Admin
        operationId: listUsers
        summary: Lists all registered users and their current status
        description: Allows an administrator to review the current users
        responses:
            "200":
                description: A list of users
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: "../openapi.yml#/components/schemas/User"
getStatus:
    get:
        tags:
            - Admin
        operationId: getAdminStatus
        summary: Gets database and server diagnostic metrics
        description: Allows an administrator to review current database and server status.
        responses:
            "200":
                description: Database and server status
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminStatus"
executeAdminSql:
    post:
        tags:
            - Admin
        operationId: executeAdminSql
        summary: Executes an admin read-only SQL diagnostic query
        description: Allows an administrator to run read-only SQL diagnostics, explain plans, and confirmed analyze plans.
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminSqlExecuteRequest"
        responses:
            "200":
                description: SQL execution result
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminSqlResult"
            "400":
                description: Invalid or blocked SQL
getAdminSqlMetadata:
    get:
        tags:
            - Admin
        operationId: getAdminSqlMetadata
        summary: Gets available SQL tables, columns, and indexes
        description: Allows an administrator to inspect read-only database metadata for the SQL editor.
        responses:
            "200":
                description: SQL metadata
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminSqlMetadata"
listExpansions:
    get:
        tags:
            - Admin
        operationId: listExpansions
        summary: Lists configured item expansions
        parameters:
            - name: locale
              in: query
              required: false
              schema:
                  type: string
              description: Optional locale override for resolved expansion names.
        responses:
            "200":
                description: Expansions
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: "../openapi.yml#/components/schemas/AdminExpansion"
    post:
        tags:
            - Admin
        operationId: createExpansion
        summary: Creates an expansion
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminExpansionRequest"
        responses:
            "200":
                description: Created expansion
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminExpansion"
            "400":
                description: Invalid expansion
            "409":
                description: Expansion id, slug, or major version already exists
expansionById:
    put:
        tags:
            - Admin
        operationId: updateExpansion
        summary: Updates an expansion
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminExpansionRequest"
        responses:
            "200":
                description: Updated expansion
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminExpansion"
            "400":
                description: Invalid expansion
            "404":
                description: Expansion not found
            "409":
                description: Slug or major version already exists
    delete:
        tags:
            - Admin
        operationId: deleteExpansion
        summary: Deletes an expansion
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            "204":
                description: Expansion deleted
            "404":
                description: Expansion not found
            "409":
                description: Expansion is referenced by ranges or items
expansionRanges:
    get:
        tags:
            - Admin
        operationId: listExpansionRanges
        summary: Lists configured item expansion ranges
        parameters:
            - name: locale
              in: query
              required: false
              schema:
                  type: string
              description: Optional locale override for resolved expansion names.
        responses:
            "200":
                description: Expansion ranges
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: "../openapi.yml#/components/schemas/AdminExpansionItemRange"
    post:
        tags:
            - Admin
        operationId: createExpansionRange
        summary: Creates an item expansion range
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminExpansionItemRangeRequest"
        responses:
            "200":
                description: Created range
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminExpansionItemRange"
            "400":
                description: Invalid range
expansionRangeById:
    put:
        tags:
            - Admin
        operationId: updateExpansionRange
        summary: Updates an item expansion range
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
                  format: int64
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminExpansionItemRangeRequest"
        responses:
            "200":
                description: Updated range
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminExpansionItemRange"
            "400":
                description: Invalid range
            "404":
                description: Range not found
    delete:
        tags:
            - Admin
        operationId: deleteExpansionRange
        summary: Deletes an item expansion range
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
                  format: int64
        responses:
            "204":
                description: Range deleted
            "404":
                description: Range not found
applyExpansionRanges:
    post:
        tags:
            - Admin
        operationId: applyExpansionRanges
        summary: Starts a job that applies enabled expansion ranges to existing items
        responses:
            "202":
                description: Job accepted
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminJob"
            "409":
                description: A job of this type is already running
fetchMissingExpansionRangeItems:
    post:
        tags:
            - Admin
        operationId: fetchMissingExpansionRangeItems
        summary: Starts a job that fetches missing items covered by enabled expansion ranges
        responses:
            "202":
                description: Job accepted
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminJob"
            "409":
                description: A job of this type is already running
syncProfessionRecipes:
    post:
        tags:
            - Admin
        operationId: syncProfessionRecipes
        summary: Starts a profession and recipe synchronization job
        responses:
            "202":
                description: Job accepted
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminJob"
            "409":
                description: A profession and recipe synchronization is already running
getActiveProfessionSyncJob:
    get:
        tags:
            - Admin
        operationId: getActiveProfessionSyncJob
        summary: Gets the running profession and recipe synchronization job
        responses:
            "200":
                description: Running profession and recipe synchronization job
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminJob"
            "404":
                description: No profession and recipe synchronization job is running
importProfessionTalentTrees:
    post:
        tags: [Admin]
        operationId: importProfessionTalentTrees
        summary: Replace versioned profession talent tree definitions
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/ProfessionTalentTreeImportRequest"
        responses:
            "204": { description: Imported. }
            "400": { description: Unsupported or malformed versioned talent export. }
            "403": { description: Administrator role required. }
inspectNormalizedAuctionHelperProfessionData:
    post:
        tags: [Admin]
        operationId: inspectNormalizedAuctionHelperProfessionData
        summary: Validate locally normalized AuctionHelper profession data
        description: >-
            Accepts bounded, versioned JSON produced by the browser-side Lua processors. Raw Lua and
            encoded addon payloads are never accepted. This preview validates recipe, item, reagent,
            skill, and talent associations without changing shared data. Requests are limited to
            32 MiB before JSON deserialization and receive an X-Request-Id correlation header.
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/NormalizedAuctionHelperProfessionData"
        responses:
            "200":
                description: Normalized data inspection result. `imported` is always false.
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/NormalizedAuctionHelperProfessionInspection"
            "400": { description: Unsupported contract version or invalid normalized associations. }
            "403": { description: Administrator role required. }
            "413": { description: Normalized JSON request exceeds 32 MiB. }
getAdminJob:
    get:
        tags:
            - Admin
        operationId: getAdminJob
        summary: Gets an admin job
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
                  format: int64
        responses:
            "200":
                description: Admin job
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminJob"
            "404":
                description: Job not found
adminItems:
    get:
        tags:
            - Admin
        operationId: searchAdminItems
        summary: Searches effective item rows for admin editing
        parameters:
            - name: query
              in: query
              required: false
              schema:
                  type: string
              description: Optional search text matched against item id and localized names.
            - name: locale
              in: query
              required: false
              schema:
                  type: string
              description: Optional locale override for resolved labels.
            - name: hasBase
              in: query
              required: false
              schema:
                  type: boolean
              description: Filter to items with or without a Blizzard/base row.
            - name: hasOverride
              in: query
              required: false
              schema:
                  type: boolean
              description: Filter to items with or without an admin override row.
            - name: itemClassId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter to an item class id.
            - name: itemSubclassId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter to an item subclass id within the selected/effective class.
            - name: expansionId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter to an expansion id.
            - name: hasRecipe
              in: query
              required: false
              schema:
                  type: boolean
              description: Filter to items with or without an associated crafting recipe.
            - name: page
              in: query
              required: false
              schema:
                  type: integer
                  minimum: 1
                  default: 1
            - name: pageSize
              in: query
              required: false
              schema:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
        responses:
            "200":
                description: Paginated admin items
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminItemPage"
            "400":
                description: Invalid search or pagination request
    post:
        tags:
            - Admin
        operationId: createAdminItem
        summary: Creates an override-only manual item
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminItemCreateRequest"
        responses:
            "200":
                description: Created admin item
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminItem"
            "400":
                description: Invalid item
            "409":
                description: Item already has a base or override row
adminItemById:
    get:
        tags:
            - Admin
        operationId: getAdminItem
        summary: Gets an effective admin item row
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
            - name: locale
              in: query
              required: false
              schema:
                  type: string
              description: Optional locale override for resolved labels.
            - name: includeBase
              in: query
              required: false
              schema:
                  type: boolean
                  default: false
              description: Include raw Blizzard/base row fields when present.
            - name: includeOverride
              in: query
              required: false
              schema:
                  type: boolean
                  default: false
              description: Include raw sparse override row fields when present.
        responses:
            "200":
                description: Admin item
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminItem"
            "404":
                description: Item not found
adminItemOverride:
    put:
        tags:
            - Admin
        operationId: upsertAdminItemOverride
        summary: Upserts a sparse admin override for an existing item
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminItemOverrideRequest"
        responses:
            "200":
                description: Updated admin item
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminItem"
            "400":
                description: Invalid override
            "404":
                description: Base item not found
    delete:
        tags:
            - Admin
        operationId: deleteAdminItemOverride
        summary: Deletes the sparse admin override row
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            "204":
                description: Override deleted
            "404":
                description: Override not found
adminItemRecipeAssociation:
    put:
        tags:
            - Admin
        operationId: upsertAdminItemRecipeAssociation
        summary: Associates a recipe with an item by updating recipe crafted output fields
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
            - name: recipeId
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminRecipeAssociationRequest"
        responses:
            "200":
                description: Updated admin item
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminItem"
            "400":
                description: Invalid recipe association
            "404":
                description: Item or recipe not found
adminItemCompareApi:
    post:
        tags:
            - Admin
        operationId: compareAdminItemWithApi
        summary: Fetches the Blizzard API item and compares it to base, override, and effective fields
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            "200":
                description: Item API comparison
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminItemCompareResponse"
            "404":
                description: Item not found locally or in Blizzard API
adminItemBulkOverrides:
    put:
        tags:
            - Admin
        operationId: bulkUpsertAdminItemOverrides
        summary: Upserts sparse admin overrides in bulk
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminItemBulkOverrideRequest"
        responses:
            "200":
                description: Updated admin items
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: "../openapi.yml#/components/schemas/AdminItem"
            "400":
                description: Invalid bulk override request
            "404":
                description: One or more base items were not found
adminRecipes:
    get:
        tags:
            - Admin
        operationId: searchAdminRecipes
        summary: Searches effective recipe rows for admin editing
        parameters:
            - name: query
              in: query
              required: false
              schema:
                  type: string
              description: Optional search text matched against recipe id and localized recipe names.
            - name: locale
              in: query
              required: false
              schema:
                  type: string
              description: Optional locale override for resolved labels.
            - name: professionId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter to a profession id.
            - name: hasOverride
              in: query
              required: false
              schema:
                  type: boolean
              description: Filter to recipes with or without an admin override row.
            - name: itemClassId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter by the class of an associated crafted output or reagent.
            - name: itemSubclassId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter by the subclass of an associated crafted output or reagent.
            - name: expansionId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter by the expansion of an associated crafted output or reagent.
            - name: associatedItemId
              in: query
              required: false
              schema:
                  type: integer
              description: Filter to recipes associated with this item as an output or reagent.
            - name: associationType
              in: query
              required: false
              schema:
                  type: string
                  enum: [crafted, reagent]
              description: Restrict associated item filters to crafted outputs or reagents; omit for either.
            - name: page
              in: query
              required: false
              schema:
                  type: integer
                  minimum: 1
                  default: 1
            - name: pageSize
              in: query
              required: false
              schema:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
        responses:
            "200":
                description: Paginated admin recipes
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminRecipePage"
            "400":
                description: Invalid search request
adminRecipeById:
    get:
        tags:
            - Admin
        operationId: getAdminRecipe
        summary: Gets an effective admin recipe row
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
            - name: locale
              in: query
              required: false
              schema:
                  type: string
            - name: includeBase
              in: query
              required: false
              schema:
                  type: boolean
                  default: false
            - name: includeOverride
              in: query
              required: false
              schema:
                  type: boolean
                  default: false
        responses:
            "200":
                description: Admin recipe
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminRecipe"
            "404":
                description: Recipe not found
adminRecipeOverride:
    put:
        tags:
            - Admin
        operationId: upsertAdminRecipeOverride
        summary: Upserts sparse scalar and optional collection overrides for an existing recipe
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminRecipeOverrideRequest"
        responses:
            "200":
                description: Updated admin recipe
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminRecipe"
            "400":
                description: Invalid override
            "404":
                description: Base recipe not found
    delete:
        tags:
            - Admin
        operationId: deleteAdminRecipeOverride
        summary: Deletes all admin overrides for the recipe
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            "204":
                description: Override deleted
            "404":
                description: Override not found
adminRecipeCompareApi:
    post:
        tags:
            - Admin
        operationId: compareAdminRecipeWithApi
        summary: Fetches the Blizzard API recipe and compares it to base, override, and effective fields
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
        responses:
            "200":
                description: Recipe API comparison
                content:
                    application/json:
                        schema:
                            $ref: "../openapi.yml#/components/schemas/AdminRecipeCompareResponse"
            "404":
                description: Recipe not found locally or in Blizzard API
adminRecipeBulkOverrides:
    put:
        tags:
            - Admin
        operationId: bulkUpsertAdminRecipeOverrides
        summary: Upserts sparse admin recipe overrides in bulk
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../openapi.yml#/components/schemas/AdminRecipeBulkOverrideRequest"
        responses:
            "200":
                description: Updated admin recipes
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: "../openapi.yml#/components/schemas/AdminRecipe"
            "400":
                description: Invalid bulk override request
            "404":
                description: One or more base recipes were not found
