search:
  get:
    tags:
      - AuctionMarket
    operationId: search
    summary: Search auction market items for a selected realm
    description: Returns paginated item market rows. Snapshot date and hour are derived from auction house state.
    parameters:
      - name: region
        in: query
        required: true
        schema:
          type: string
          enum: [us, eu, kr, tw]
      - name: realmSlug
        in: query
        required: true
        schema:
          type: string
      - name: locale
        in: query
        required: false
        schema:
          type: string
        description: Optional locale override. Defaults to the selected realm locale.
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          default: itemName
          enum:
            - itemName
            - quality
            - itemClass
            - itemSubclass
            - selectedPrice
            - commodityPrice
            - selectedQuantity
            - commodityQuantity
      - name: sortDirection
        in: query
        required: false
        schema:
          type: string
          default: asc
          enum: [asc, desc]
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: qualityIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      - name: itemClassIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      - name: itemSubclassIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      - name: expansionIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      - name: recipeOnly
        in: query
        required: false
        schema:
          type: boolean
      - name: minPrice
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: maxPrice
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: minQuantity
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: maxQuantity
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      - name: minSaleRatePercent
        in: query
        required: false
        description: Minimum TSM sale rate as a percent (25 means 25%). Bound as fraction against tsm.sale_rate.
        schema:
          type: number
          format: double
      - name: maxSaleRatePercent
        in: query
        required: false
        description: Maximum TSM sale rate as a percent (25 means 25%). Bound as fraction against tsm.sale_rate.
        schema:
          type: number
          format: double
      - name: minSoldPerDay
        in: query
        required: false
        description: Minimum TSM average sold per day.
        schema:
          type: number
          format: double
      - name: maxSoldPerDay
        in: query
        required: false
        description: Maximum TSM average sold per day.
        schema:
          type: number
          format: double
    responses:
      "200":
        description: Paginated market search results.
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/AuctionMarketSearchPage"
      "400":
        description: Invalid search request.
      "404":
        description: Realm was not found.

filters:
  get:
    tags:
      - AuctionMarket
    operationId: filters
    summary: Return market search filter definitions
    description: Returns database-derived filters for the selected realm and locale.
    parameters:
      - name: region
        in: query
        required: true
        schema:
          type: string
          enum: [us, eu, kr, tw]
      - name: realmSlug
        in: query
        required: true
        schema:
          type: string
      - name: locale
        in: query
        required: false
        schema:
          type: string
        description: Optional locale override. Defaults to the selected realm locale.
    responses:
      "200":
        description: Filter definitions.
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/AuctionMarketFilterResponse"
      "400":
        description: Invalid filter request.
      "404":
        description: Realm was not found.

getAuctionItemDetail:
  get:
    tags:
      - AuctionMarket
    operationId: getAuctionMarketItemDetail
    summary: Item Codex detail for one market listing bucket
    description: >
      Returns charts, summary metrics, and optional crafting economics for one item.
      Snapshot date/hour match market search. Variant query params scope stats to one
      auction_stats_hourly row; omit them for item-wide rollup.
    parameters:
      - name: region
        in: query
        required: true
        schema:
          type: string
          enum: [us, eu, kr, tw]
      - name: realmSlug
        in: query
        required: true
        schema:
          type: string
      - name: itemId
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: bonusKey
        in: query
        required: false
        schema:
          type: string
          default: ""
      - name: modifierKey
        in: query
        required: false
        schema:
          type: string
          default: ""
      - name: petSpeciesId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: scope
        in: query
        required: false
        schema:
          type: string
          enum: [realm, commodity]
          default: realm
      - name: preferredRecipeId
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: locale
        in: query
        required: false
        schema:
          type: string
    responses:
      "200":
        description: Item detail payload.
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/AuctionMarketItemDetailResponse"
      "400":
        description: Invalid request.
      "404":
        description: Realm or item context not found.

getAuctionItemCraftingAnalytics:
  get:
    tags:
      - AuctionMarket
    operationId: getAuctionMarketItemCraftingAnalytics
    summary: 14-day crafting economics for one item recipe
    parameters:
      - name: region
        in: query
        required: true
        schema:
          type: string
          enum: [us, eu, kr, tw]
      - name: realmSlug
        in: query
        required: true
        schema:
          type: string
      - name: itemId
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: recipeId
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: bonusKey
        in: query
        required: false
        schema:
          type: string
          default: ""
      - name: modifierKey
        in: query
        required: false
        schema:
          type: string
          default: ""
      - name: petSpeciesId
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: locale
        in: query
        required: false
        schema:
          type: string
    responses:
      "200":
        description: Crafting analytics payload.
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/AuctionMarketItemCraftingAnalyticsResponse"
      "400":
        description: Invalid request.
      "404":
        description: Realm, item, or recipe context not found.
