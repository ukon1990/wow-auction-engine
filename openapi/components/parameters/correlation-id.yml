name: X-Correlation-ID
in: header
required: false
description: >-
  Canonical UUID used to correlate one request across the frontend, BFF,
  backend, and downstream services. A missing or invalid value is replaced.
schema:
  type: string
  format: uuid
  minLength: 36
  maxLength: 36
  pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89aAbB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
example: 0198c728-8f4b-7ccb-9953-d23cc1976587
