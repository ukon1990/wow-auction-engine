name: X-Client-Session-ID
in: header
required: false
description: >-
  Canonical UUID identifying one browser tab session for observability. The
  value is optional, is never generated by the backend, and is not an
  authentication or authorization credential.
schema:
  type: string
  format: uuid
  minLength: 36
  maxLength: 36
  pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89aAbB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
example: 0198c728-a27c-7286-a24e-230ea6be5045
