type: object
required: [state, craftable, diagnostic, alternatives]
description: |
  Personal crafting context for the authenticated caller only. When imported recipe rules and talent
  effects exist, craftable and predicted output quality are computed from saved profile allocations.
properties:
  state:
    type: string
    enum: [configured, default]
  craftable:
    type: boolean
    nullable: true
    description: Null when the imported recipe data has no requirement or talent-effect rules.
  diagnostic:
    type: string
    enum:
      - anonymous_default
      - no_matching_profile_default
      - recipe_rules_unavailable_heuristic_ranking
      - recipe_rules_missing
      - talent_effects_missing
      - profile_evaluated
  bestCandidate:
    allOf:
      - $ref: "../../openapi.yml#/components/schemas/CraftingProfileCandidate"
    nullable: true
  alternatives:
    type: array
    description: Other matching user-owned candidates in deterministic heuristic order.
    items:
      $ref: "../../openapi.yml#/components/schemas/CraftingProfileCandidate"
