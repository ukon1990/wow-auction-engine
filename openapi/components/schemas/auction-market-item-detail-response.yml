type: object
required:
    - item
    - listingKey
    - rollupListing
    - regionalMetricsRedundant
    - marketDataSources
    - selectedRealm
    - commodity
    - summary
    - dailySeriesRealm
    - dailySeriesCommodity
    - hourlySeriesRealm
    - hourlySeriesCommodity
    - quantityPieRealm
    - quantityPieCommodity
    - currentListings
    - craftings
    - craftedByRecipeCount
    - reagentInRecipeCount
properties:
    item:
        $ref: "../../openapi.yml#/components/schemas/AuctionMarketItem"
    listingKey:
        $ref: "../../openapi.yml#/components/schemas/AuctionListingKey"
        description: Effective listing key used for all queries (defaults applied when query omitted).
    rollupListing:
        type: boolean
        description: True when bonus/modifier/pet defaults mean item-wide rollup (no explicit variant in request).
    regionalMetricsRedundant:
        type: boolean
    marketDataSources:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/MarketDataSource"
    selectedRealm:
        $ref: "../../openapi.yml#/components/schemas/AuctionMarketMetrics"
    commodity:
        $ref: "../../openapi.yml#/components/schemas/AuctionMarketMetrics"
    summary:
        $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemDetailSummary"
    dailySeriesRealm:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemDetailPoint"
    dailySeriesCommodity:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemDetailPoint"
    hourlySeriesRealm:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemHourlyPoint"
    hourlySeriesCommodity:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemHourlyPoint"
    quantityPieRealm:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketQuantityPieSlice"
    quantityPieCommodity:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketQuantityPieSlice"
    currentListings:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemCurrentListing"
    crafting:
        $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemCrafting"
        nullable: true
        deprecated: true
    craftings:
        type: array
        items:
            $ref: "../../openapi.yml#/components/schemas/AuctionMarketItemCraftingDetail"
    saleRate:
        type: number
        format: double
        nullable: true
        description: |
            TSM regional sale rate for this item in the request region, as a fraction in [0, 1]
            (e.g. 0.25 means 25%). Null when no TSM metric row exists for the region/item.
    soldPerDay:
        type: number
        format: double
        nullable: true
        description: |
            TSM regional average units sold per day for this item in the request region.
            Null when no TSM metric row exists for the region/item.
    craftedByRecipeCount:
        type: integer
        minimum: 0
        description: Number of distinct recipes that craft this item as an output.
    reagentInRecipeCount:
        type: integer
        minimum: 0
        description: Number of distinct recipes that list this item as a reagent (base or ranked).
