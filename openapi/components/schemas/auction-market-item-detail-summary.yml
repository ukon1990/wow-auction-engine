type: object
description: Card metrics and day-over-day hints for the selected snapshot.
properties:
    selectedRealmPrice:
        type: integer
        format: int64
        nullable: true
    selectedRealmQuantity:
        type: integer
        format: int64
        nullable: true
    commodityPrice:
        type: integer
        format: int64
        nullable: true
    commodityQuantity:
        type: integer
        format: int64
        nullable: true
    selectedRealmPriceChangePercent:
        type: number
        format: double
        nullable: true
        description: vs previous day aggregate (null if not computable).
    commodityPriceChangePercent:
        type: number
        format: double
        nullable: true
    realmVsCommodityPricePercent:
        type: number
        format: double
        nullable: true
        description: Positive if realm price above commodity.
