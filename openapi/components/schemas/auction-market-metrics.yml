type: object
required:
  - connectedRealmId
properties:
  connectedRealmId:
    type: integer
  timestamp:
    type: string
    format: date-time
    nullable: true
  date:
    type: string
    format: date
    nullable: true
  hourOfDay:
    type: integer
    nullable: true
  price:
    type: integer
    format: int64
    nullable: true
  p25Price:
    type: integer
    format: int64
    nullable: true
    description: 25th percentile buyout for the same current auction variant.
  p75Price:
    type: integer
    format: int64
    nullable: true
    description: 75th percentile buyout for the same current auction variant.
  quantity:
    type: integer
    format: int64
    nullable: true
