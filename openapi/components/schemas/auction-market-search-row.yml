type: object
required:
  - item
  - preferredScope
properties:
  item:
    $ref: "../../openapi.yml#/components/schemas/AuctionMarketItem"
  preferredScope:
    type: string
    description: Preferred detail scope for this row (`realm` or `commodity`).
  listingPrice:
    type: integer
    format: int64
    description: Unified listing unit price in copper (realm snapshot if present, else commodity).
  listingQuantity:
    type: integer
    format: int64
    description: Total quantity for the unified listing price bucket.
  isCommodity:
    type: boolean
    description: True when the unified listing values come from commodity only (no realm snapshot row).
  listingKey:
    $ref: "../../openapi.yml#/components/schemas/AuctionListingKey"
    description: Bucket that supplied selectedRealm price (lowest unit price at snapshot hour).
  selectedRealm:
    $ref: "../../openapi.yml#/components/schemas/AuctionMarketMetrics"
  commodity:
    $ref: "../../openapi.yml#/components/schemas/AuctionMarketMetrics"
  saleRate:
    type: number
    format: double
    nullable: true
    description: |
      TSM regional sale rate for this item in the request region, as a fraction in [0, 1]
      (e.g. 0.25 means 25%). Null when no TSM metric row exists for the region/item.
  soldPerDay:
    type: number
    format: double
    nullable: true
    description: |
      TSM regional average units sold per day for this item in the request region.
      Null when no TSM metric row exists for the region/item.
