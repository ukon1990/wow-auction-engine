type: object
required:
  - characterId
  - characterName
  - region
  - realmName
  - professionId
  - allocationCount
properties:
  characterId: { type: integer, format: int64 }
  characterName: { type: string }
  region: { type: string }
  realmName: { type: string }
  professionId: { type: integer, format: int32 }
  skillLevel: { type: integer, format: int32, nullable: true }
  allocationCount:
    type: integer
    format: int32
    description: Number of configured skill-tree entries. Used as a tie-breaker after predicted output quality.
  predictedQuality:
    type: integer
    format: int32
    nullable: true
    minimum: 0
    description: Highest output quality tier predicted from saved allocations and imported recipe rules.
