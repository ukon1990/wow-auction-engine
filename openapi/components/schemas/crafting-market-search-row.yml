type: object
required:
  - rowId
  - recipeId
  - listingKey
  - craftedQuantity
  - reagentsFullyPriced
  - outputPriced
properties:
  rowId:
    type: string
    description: Stable id for table rows (recipe + listing variant).
  recipeId:
    type: integer
    format: int32
  recipe:
    $ref: "../../openapi.yml#/components/schemas/AuctionMarketRecipe"
  item:
    $ref: "../../openapi.yml#/components/schemas/AuctionMarketItem"
  listingKey:
    $ref: "../../openapi.yml#/components/schemas/AuctionListingKey"
  professionId:
    type: integer
    format: int32
    nullable: true
    description: |
      Profession id for the recipe, taken from `profession.id` via
      `profession_category` and `skill_tier`. Nullable because recipes can be
      orphaned from their profession metadata when reference data sync is in
      progress, in which case the row is still surfaced with a null profession.
  professionName:
    type: string
    nullable: true
    description: Localized profession name. Nullable for the same reason as `professionId`.
  skillTierName:
    type: string
    nullable: true
  professionCategoryName:
    type: string
    nullable: true
  craftedQuantity:
    type: integer
    format: int32
  listingQuantity:
    type: integer
    format: int64
    nullable: true
    description: Quantity at the snapshot for this crafted listing bucket.
  reagentCostCopper:
    type: integer
    format: int64
    nullable: true
  outputPriceCopper:
    type: integer
    format: int64
    nullable: true
    description: Unit buyout for this listing variant at the snapshot hour.
  outputP25PriceCopper:
    type: integer
    format: int64
    nullable: true
    description: 25th percentile buyout for this listing variant at the current snapshot.
  outputP75PriceCopper:
    type: integer
    format: int64
    nullable: true
    description: 75th percentile buyout for this listing variant at the current snapshot.
  profitCopper:
    type: integer
    format: int64
    nullable: true
  roiPercent:
    type: number
    format: double
    nullable: true
  outputPriceChangePercent:
    type: number
    format: double
    nullable: true
    description: vs prior calendar day same hour for this variant.
  profitChangePercent:
    type: number
    format: double
    nullable: true
  reagentsFullyPriced:
    type: boolean
  outputPriced:
    type: boolean
