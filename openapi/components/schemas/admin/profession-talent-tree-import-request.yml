type: object
required: [formatVersion, source, sourceVersion, trees]
properties:
  formatVersion: { type: integer, enum: [1] }
  source: { type: string, minLength: 1 }
  sourceVersion: { type: string, minLength: 1 }
  addonVersion: { type: string }
  schemaVersion: { type: integer }
  gameBuild: { type: string }
  trees:
    type: array
    minItems: 1
    items:
      type: object
      required: [expansionId, professionId, externalTreeId, name, tabs]
      properties:
        expansionId: { type: integer }
        professionId: { type: integer }
        externalTreeId: { type: integer }
        name: { type: string }
        description: { type: string }
        tabs:
          type: array
          items:
            type: object
            required: [externalTabId, name, nodes]
            properties:
              externalTabId: { type: integer }
              name: { type: string }
              description: { type: string }
              nodes:
                type: array
                items:
                  type: object
                  required: [externalNodeId, name, maxRanks, entries]
                  properties:
                    externalNodeId: { type: integer }
                    name: { type: string }
                    description: { type: string }
                    maxRanks: { type: integer, minimum: 1 }
                    requiredRank:
                      type: integer
                      minimum: 0
                      description: Minimum total ranks allocated to this node before it can be allocated.
                    entries:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required: [externalEntryId, name, rankLimit]
                        properties:
                          externalEntryId: { type: integer }
                          name: { type: string }
                          description: { type: string }
                          rankLimit: { type: integer, minimum: 1 }
