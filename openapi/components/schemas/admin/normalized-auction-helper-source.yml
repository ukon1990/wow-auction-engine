type: object
additionalProperties: false
required: [addon, processorVersion, files]
properties:
  addon: { type: string, enum: [AuctionHelper] }
  addonVersion: { type: string, maxLength: 64 }
  processorVersion: { type: string, minLength: 1, maxLength: 64 }
  files:
    type: array
    minItems: 1
    maxItems: 8
    items:
      type: object
      additionalProperties: false
      required: [fileName, sha256]
      properties:
        fileName: { type: string, minLength: 1, maxLength: 128 }
        sha256: { type: string, pattern: '^[a-fA-F0-9]{64}$' }
