type: object
required: [imported, contentHash, importedAt, charactersFound, professionsFound, recipesFound, diagnostics]
properties:
  imported:
    type: boolean
    enum: [false]
    description: Always false. Lua uploads are inspected only and never replace shared tree data.
  contentHash:
    type: string
    description: SHA-256 of the uploaded file, or empty when an oversized upload is rejected before reading it.
  importedAt:
    type: string
    format: date-time
  charactersFound:
    type: integer
    minimum: 0
  professionsFound:
    type: integer
    minimum: 0
  recipesFound:
    type: integer
    minimum: 0
  diagnostics:
    type: array
    minItems: 1
    items:
      type: object
      required: [code, detail]
      properties:
        code:
          type: string
          enum: [TALENT_DATA_MISSING, UNSUPPORTED_TALENT_EXPORT, INPUT_LIMIT_EXCEEDED, MALFORMED_INPUT]
        detail:
          type: string
