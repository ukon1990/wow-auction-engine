type: object
additionalProperties: false
required: [characterKey, name, realm, region, professions]
properties:
  characterKey: { type: string, minLength: 1, maxLength: 256 }
  name: { type: string, minLength: 1, maxLength: 64 }
  realm: { type: string, minLength: 1, maxLength: 128 }
  region: { type: string, minLength: 1, maxLength: 16 }
  professions:
    type: array
    maxItems: 32
    items: { $ref: ./normalized-auction-helper-profession.yml }
