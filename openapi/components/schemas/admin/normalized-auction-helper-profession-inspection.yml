type: object
additionalProperties: false
required:
  [imported, charactersFound, professionsFound, recipesFound, recipesWithOutputItemFound, missingOutputItemAssociations, missingReagentItemAssociations, missingCraftingSkillData, diagnostics]
properties:
  imported:
    type: boolean
    enum: [false]
    description: Preview only; normalized data is not persisted.
  charactersFound: { type: integer, minimum: 0 }
  professionsFound: { type: integer, minimum: 0 }
  recipesFound: { type: integer, minimum: 0 }
  recipesWithOutputItemFound: { type: integer, minimum: 0 }
  missingOutputItemAssociations: { type: integer, minimum: 0 }
  missingReagentItemAssociations: { type: integer, minimum: 0 }
  missingCraftingSkillData: { type: integer, minimum: 0 }
  diagnostics:
    type: array
    maxItems: 1000
    items: { $ref: ./normalized-auction-helper-profession-diagnostic.yml }
