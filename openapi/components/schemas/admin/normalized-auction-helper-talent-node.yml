type: object
additionalProperties: false
required: [nodeId, entries]
properties:
  nodeId: { type: integer, minimum: 1 }
  maxRanks: { type: integer, minimum: 1 }
  requiredRank: { type: integer, minimum: 0, description: Knowledge points required to unlock this node. }
  name: { type: string, maxLength: 128 }
  description: { type: string, maxLength: 4096 }
  parentNodeIds:
    type: array
    maxItems: 32
    description: External node IDs that must be connected to this node as its parents.
    items: { type: integer, minimum: 1 }
  entries:
    type: array
    maxItems: 32
    items: { $ref: ./normalized-auction-helper-talent-entry.yml }
