type: object
additionalProperties: false
required: [code, detail, count, exampleRecipeIds]
properties:
  code:
    type: string
    enum: [CRAFTED_ITEM_MISSING, REAGENT_ITEM_MISSING, CRAFTING_SKILL_DATA_MISSING, MAX_QUALITY_REAGENT_ASSOCIATION_INCOMPLETE, TALENT_DATA_MISSING, TALENT_ALLOCATION_MISSING_NODE, TALENT_ALLOCATION_MISSING_ENTRY]
  detail: { type: string, minLength: 1, maxLength: 512 }
  count: { type: integer, minimum: 1 }
  exampleRecipeIds:
    type: array
    maxItems: 10
    items: { type: integer, minimum: 1 }
