type: object
required: [itemId, quantity, sortOrder]
properties:
  id:
    type: integer
    format: int64
    nullable: true
  itemId:
    type: integer
  itemName:
    type: string
    nullable: true
  quantity:
    type: integer
    minimum: 1
  sortOrder:
    type: integer
    minimum: 0
  ranks:
    type: array
    items:
      $ref: "../../../openapi.yml#/components/schemas/AdminRecipeReagentRank"
    default: []
