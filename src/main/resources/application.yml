spring:
  application:
    name: auction-engine
  cloud:
    aws:
      region:
        static: ${WAE_AWS_REGION:eu-west-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY:local-dev-key}
        secret-key: ${AWS_SECRET_KEY:local-dev-secret}
      dynamodb:
        endpoint: "http://localhost:4566"
      s3:
        endpoint: "http://localhost:4566"
        bootstrap-enabled: true
  datasource:
    url: "jdbc:mariadb://localhost:59000/dbo?serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true"
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 200

app:
  scheduling:
    enabled: true
    initial-delay: PT30S
    item-sync-cron: "0 0 * * * *"
    item-sync-zone: GMT+1
    item-sync-startup-delay: PT30S
    item-sync-startup-repeat-delay: P3650D
    profession-recipe-sync-cron: "0 0 8 ? * WED"
    profession-recipe-sync-zone: GMT+1
    profession-recipe-sync-startup-delay: PT30S
    profession-recipe-sync-startup-repeat-delay: P3650D
    deleted-auction-cleanup-cron: "0 0 4 * * *"
    deleted-auction-cleanup-zone: GMT+1
  health:
    stuck-update-threshold: PT20M

blizzard:
  client-id: ${BLIZZARD_CLIENT_ID}
  client-secret: ${BLIZZARD_CLIENT_SECRET}
  regions: ${WAE_BLIZZARD_REGIONS:${WAE_BLIZZARD_REGION}}
  static-data-region: ${WAE_STATIC_DATA_REGION:Europe}
  token-url: https://eu.battle.net/oauth/token
  base-url: api.blizzard.com/data/wow/

wae:
  s3:
    buckets:
      northamerica:
        name: wah-data-us
        bucket-region: us-west-1
      europe:
        name: wah-data-eu
        bucket-region: eu-west-1
      korea:
        name: wah-data-as
        bucket-region: ap-northeast-2
      taiwan:
        name: wah-data-as
        bucket-region: ap-northeast-2
