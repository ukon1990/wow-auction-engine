amazon.aws.accesskey: fakeMyKeyId
amazon.aws.secretkey: fakeSecretAccessKey

spring:
  application:
    name: auction-engine
  datasource:
    url: "jdbc:mariadb://localhost:59000/dbo?serverTimezone=UTC&cachePrepStmts=true&useServerPrepStmts=true&rewriteBatchedStatements=true"
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: update  # Use 'update' to create/update tables
    properties:
      hibernate:
        format_sql: false
        hbm2ddl:
          auto:
            create: false
            update: true
        jdbc:
          batch_size: 200
  properties:
    javax:
      persistence:
        schema-generation:
          scripts:
            action: create
            create-target: create.sql
            drop-target: drop.sql
          create-source: metadata
          drop-source: metadata

blizzard:
  client-id: ${BLIZZARD_CLIENT_ID}
  client-secret: ${BLIZZARD_CLIENT_SECRET}
  region: ${WAE_BLIZZARD_REGION}
  token-url: https://eu.battle.net/oauth/token
  base-url: api.blizzard.com/data/wow/
cloud:
  aws:
    region:
      static: ${WAE_AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
amazon:
  dynamodb:
    endpoint: "http://localhost:58000"
  aws:
    region:
      static: ${WAE_AWS_REGION}
    credentials:
      accesskey: fakeMyKeyId
      secretkey: fakeSecretAccessKey
