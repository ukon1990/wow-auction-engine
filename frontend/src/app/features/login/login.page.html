<main
  id="page-main"
  tabindex="-1"
  class="mx-auto flex min-h-0 w-full max-w-xl flex-1 flex-col justify-center gap-8 px-4 py-12 outline-none focus:outline-none scroll-mt-20"
>
  <header class="text-center">
    <p class="ee-data uppercase text-outline">The Ethereal Exchange</p>
    <h1
      class="font-cinzel text-3xl font-bold text-primary-container drop-shadow-[0_0_8px_rgba(236,185,19,0.4)] sm:text-4xl"
    >
      Account access
    </h1>
    <p class="mt-3 text-on-surface/80">
      Sign in or create an account to unlock protected auction tools.
    </p>
  </header>

  <div class="grid grid-cols-2 rounded-lg border border-white/10 bg-surface-container-highest p-1">
    <button
      type="button"
      class="h-10 rounded-md text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-primary-container"
      [class.bg-primary]="mode() === 'login'"
      [class.text-on-primary]="mode() === 'login'"
      [class.text-outline]="mode() !== 'login'"
      (click)="setMode('login')"
    >
      Sign in
    </button>
    <button
      type="button"
      class="h-10 rounded-md text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-primary-container"
      [class.bg-primary]="mode() !== 'login'"
      [class.text-on-primary]="mode() !== 'login'"
      [class.text-outline]="mode() === 'login'"
      (click)="setMode('signup')"
    >
      Create account
    </button>
  </div>

  <form class="grid gap-4" (submit)="$event.preventDefault(); submit()">
    <label class="grid gap-2">
      <span class="ee-data uppercase text-outline">Email</span>
      <input
        class="h-12 rounded-md border border-white/10 bg-surface-container-highest px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
        type="email"
        name="email"
        autocomplete="email"
        required
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        (blur)="emailTouched.set(true)"
      />
      @if (emailError()) {
        <span class="text-sm text-error">{{ emailError() }}</span>
      }
    </label>

    @if (mode() !== 'confirm') {
      <label class="grid gap-2">
        <span class="ee-data uppercase text-outline">Password</span>
        <input
          class="h-12 rounded-md border border-white/10 bg-surface-container-highest px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
          type="password"
          name="password"
          [autocomplete]="mode() === 'signup' ? 'new-password' : 'current-password'"
          required
          minlength="8"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (blur)="passwordTouched.set(true)"
        />
        @if (passwordError()) {
          <span class="text-sm text-error">{{ passwordError() }}</span>
        }
      </label>

      @if (mode() === 'signup') {
        <label class="grid gap-2">
          <span class="ee-data uppercase text-outline">Confirm password</span>
          <input
            class="h-12 rounded-md border border-white/10 bg-surface-container-highest px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
            type="password"
            name="confirmPassword"
            autocomplete="new-password"
            required
            minlength="8"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            (blur)="confirmPasswordTouched.set(true)"
          />
          @if (confirmPasswordError()) {
            <span class="text-sm text-error">{{ confirmPasswordError() }}</span>
          }
        </label>
      }
    } @else {
      <label class="grid gap-2">
        <span class="ee-data uppercase text-outline">Confirmation code</span>
        <input
          class="h-12 rounded-md border border-white/10 bg-surface-container-highest px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
          type="text"
          name="confirmationCode"
          inputmode="numeric"
          autocomplete="one-time-code"
          required
          [ngModel]="confirmationCode()"
          (ngModelChange)="confirmationCode.set($event)"
          (blur)="confirmationCodeTouched.set(true)"
        />
        @if (confirmationCodeError()) {
          <span class="text-sm text-error">{{ confirmationCodeError() }}</span>
        }
      </label>
    }

    @if (notice()) {
      <p
        class="rounded-md border border-primary/30 bg-primary/10 px-3 py-2 text-sm text-primary-container"
      >
        {{ notice() }}
      </p>
    }

    @if (error()) {
      <p class="rounded-md border border-error/30 bg-error/10 px-3 py-2 text-sm text-error">
        {{ error() }}
      </p>
    }

    <button
      type="submit"
      class="h-12 rounded-md bg-primary px-4 font-semibold text-on-primary transition hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary-container disabled:cursor-wait disabled:opacity-70"
      [disabled]="loading()"
    >
      @if (mode() === 'signup') {
        Create account
      } @else if (mode() === 'confirm') {
        Confirm email
      } @else {
        Sign in
      }
    </button>
  </form>
</main>
