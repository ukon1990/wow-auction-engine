<ee-page-frame title="Profile" eyebrow="Account">
  @if (loading()) {
    <div class="grid max-w-3xl gap-4">
      <div class="h-24 rounded-md border border-white/10 bg-surface-container-highest"></div>
      <div class="h-72 rounded-md border border-white/10 bg-surface-container-highest"></div>
    </div>
  } @else if (user()) {
    <section class="grid max-w-3xl gap-6">
      <div class="grid gap-2 rounded-md border border-white/10 bg-surface-container-highest p-5">
        <p class="ee-data uppercase text-outline">Email</p>
        <p class="break-words text-lg font-semibold text-on-surface">
          {{ user()?.email ?? 'Unknown' }}
        </p>
      </div>

      <form
        class="grid gap-4 rounded-md border border-white/10 bg-surface-container-highest p-5"
        (submit)="$event.preventDefault(); changePassword()"
      >
        <header class="grid gap-1">
          <h2 class="font-cinzel text-xl font-bold text-primary-container">Change password</h2>
        </header>

        <label class="grid gap-2">
          <span class="ee-data uppercase text-outline">Current password</span>
          <input
            class="h-12 rounded-md border border-white/10 bg-background px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
            type="password"
            name="currentPassword"
            autocomplete="current-password"
            required
            [ngModel]="currentPassword()"
            (ngModelChange)="currentPassword.set($event)"
            (blur)="currentPasswordTouched.set(true)"
          />
          @if (currentPasswordError()) {
            <span class="text-sm text-error">{{ currentPasswordError() }}</span>
          }
        </label>

        <label class="grid gap-2">
          <span class="ee-data uppercase text-outline">New password</span>
          <input
            class="h-12 rounded-md border border-white/10 bg-background px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
            type="password"
            name="newPassword"
            autocomplete="new-password"
            required
            minlength="8"
            [ngModel]="newPassword()"
            (ngModelChange)="newPassword.set($event)"
            (blur)="newPasswordTouched.set(true)"
          />
          @if (newPasswordError()) {
            <span class="text-sm text-error">{{ newPasswordError() }}</span>
          }
        </label>

        <label class="grid gap-2">
          <span class="ee-data uppercase text-outline">Confirm new password</span>
          <input
            class="h-12 rounded-md border border-white/10 bg-background px-3 text-on-surface outline-none transition focus:border-primary focus:ring-1 focus:ring-primary"
            type="password"
            name="confirmPassword"
            autocomplete="new-password"
            required
            minlength="8"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            (blur)="confirmPasswordTouched.set(true)"
          />
          @if (confirmPasswordError()) {
            <span class="text-sm text-error">{{ confirmPasswordError() }}</span>
          }
        </label>

        @if (notice()) {
          <p
            class="rounded-md border border-primary/30 bg-primary/10 px-3 py-2 text-sm text-primary-container"
          >
            {{ notice() }}
          </p>
        }

        @if (error()) {
          <p class="rounded-md border border-error/30 bg-error/10 px-3 py-2 text-sm text-error">
            {{ error() }}
          </p>
        }

        <div class="flex flex-wrap gap-3">
          <button
            type="submit"
            class="h-11 rounded-md bg-primary px-4 font-semibold text-on-primary transition hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary-container disabled:cursor-wait disabled:opacity-70"
            [disabled]="changingPassword()"
          >
            Update password
          </button>
          <button
            type="button"
            class="h-11 rounded-md border border-white/10 px-4 font-semibold text-on-surface transition hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-primary-container"
            (click)="signOut()"
          >
            Sign out
          </button>
        </div>
      </form>
    </section>
  }
</ee-page-frame>
