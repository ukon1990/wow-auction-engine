<ee-page-frame
  title="Status"
  eyebrow="Admin"
  [loading]="loading() && !status()"
  titleId="admin-status-title"
>
  <div class="flex flex-wrap items-center justify-between gap-3">
    <p class="ee-data text-outline">Last updated: {{ lastUpdatedLabel() }}</p>
    <div class="flex flex-wrap items-center gap-3">
      <label class="ee-label flex items-center gap-2 text-on-surface">
        <input
          type="checkbox"
          class="h-4 w-4 rounded border-white/20 bg-surface-container text-primary accent-primary"
          [checked]="backgroundUpdates()"
          (change)="updateBackgroundUpdates($event)"
        />
        Update in the background
      </label>
      <button
        type="button"
        class="h-10 rounded-md border border-white/10 px-4 font-semibold text-on-surface transition hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-primary-container disabled:cursor-wait disabled:opacity-70"
        [disabled]="loading()"
        (click)="refresh()"
      >
        Refresh
      </button>
    </div>
  </div>

  @if (error()) {
    <p class="rounded-md border border-error/30 bg-error/10 px-3 py-2 text-sm text-error">
      {{ error() }}
    </p>
  }

  @if (status(); as s) {
    <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4" aria-label="Status metrics">
      <ee-item-stat-card
        label="Threads connected"
        icon="settings"
        [value]="s.connections.threadsConnected"
        [caption]="'Max used: ' + s.connections.maxUsedConnections"
      />
      <ee-item-stat-card
        label="Database uptime"
        icon="query_stats"
        [value]="uptimeLabel(s.connections.uptimeSeconds)"
        caption="From MariaDB global status"
      />
      <ee-item-stat-card
        label="JVM memory"
        icon="schema"
        [value]="s.server.usedMemoryMb"
        unit="MB"
        [caption]="
          'Total: ' + s.server.totalMemoryMb + ' MB / Max: ' + s.server.maxMemoryMb + ' MB'
        "
      />
      <ee-item-stat-card
        label="CPU"
        icon="show_chart"
        [value]="percentLabel(s.server.processCpuLoad)"
        [caption]="'System: ' + percentLabel(s.server.systemCpuLoad)"
      />
    </section>

    <section class="grid gap-4" aria-label="Status history">
      <header>
        <h2 class="font-cinzel text-xl font-bold text-primary-container">Status history</h2>
        <p class="ee-data text-outline">
          {{ history().length }} samples from this browser session.
        </p>
      </header>

      <div class="grid gap-4 xl:grid-cols-2">
        <div class="ee-glass min-w-0 rounded-lg p-inner-padding">
          <h3 class="ee-label mb-3 text-on-surface">Memory usage</h3>
          <ee-chart [options]="memoryGaugeOptions()" [minHeightPx]="260"></ee-chart>
        </div>
        <div class="ee-glass min-w-0 rounded-lg p-inner-padding">
          <h3 class="ee-label mb-3 text-on-surface">Threads connected</h3>
          <ee-chart [options]="threadsGaugeOptions()" [minHeightPx]="260"></ee-chart>
        </div>
      </div>

      <div class="grid gap-4 xl:grid-cols-3">
        <div class="ee-glass min-w-0 rounded-lg p-inner-padding">
          <h3 class="ee-label mb-3 text-on-surface">CPU over time</h3>
          <ee-chart [options]="cpuHistoryOptions()" [minHeightPx]="280"></ee-chart>
        </div>
        <div class="ee-glass min-w-0 rounded-lg p-inner-padding">
          <h3 class="ee-label mb-3 text-on-surface">Memory over time</h3>
          <ee-chart [options]="memoryHistoryOptions()" [minHeightPx]="280"></ee-chart>
        </div>
        <div class="ee-glass min-w-0 rounded-lg p-inner-padding">
          <h3 class="ee-label mb-3 text-on-surface">Threads over time</h3>
          <ee-chart [options]="threadsHistoryOptions()" [minHeightPx]="280"></ee-chart>
        </div>
      </div>
    </section>

    <section class="grid min-h-[22rem] gap-3">
      <header>
        <h2 class="font-cinzel text-xl font-bold text-primary-container">Running queries</h2>
      </header>
      <ee-table
        [columns]="runningQueryColumns()"
        [data]="s.runningQueries"
        [loading]="loading() && s.runningQueries.length === 0"
        [skeletonRowCount]="5"
        emptyMessage="No running queries."
        sectionAriaLabel="Running queries"
      />
    </section>

    <section class="grid min-h-[28rem] gap-3">
      <header>
        <h2 class="font-cinzel text-xl font-bold text-primary-container">Table and index sizes</h2>
      </header>
      <ee-table
        [columns]="tableSizeColumns()"
        [data]="s.tableSizes"
        [loading]="loading() && s.tableSizes.length === 0"
        [skeletonRowCount]="10"
        emptyMessage="No table size metrics available."
        sectionAriaLabel="Table and index sizes"
      />
    </section>
  }
</ee-page-frame>
