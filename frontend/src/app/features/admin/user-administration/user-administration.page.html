<ee-page-frame [title]="'Users'" eyebrow="Admin" [loading]="loading()" titleId="user-page-title">
  <ee-table
    headerRowClass=""
    [bodyRowClassFn]="marketRowClass"
    [clickableRows]="false"
    [columns]="columns()"
    [contentMinWidthClass]="'full'"
    [data]="users()"
    [loading]="loading()"
    [manualSorting]="true"
    [rowGridTemplateColumns]="gridTemplate()"
    [skeletonRowCount]="25"
    emptyMessage="No market items available."
    i18n-sectionAriaLabel="@@admin.users.table.aria"
    sectionAriaLabel="Users"
  />
</ee-page-frame>
