version: '3.1'
name: wow-auction-house

services:
  mariadb:
    image: mariadb:10.11
    ports:
      - "54000:3306"
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - "./docker/initdb:/docker-entrypoint-initdb.d:ro"

  dynamodb-local:
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "./data"]
    image: "amazon/dynamodb-local:latest"
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
